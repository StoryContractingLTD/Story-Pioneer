<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Story Pioneer</title>
<meta name="description" content="An interactive self-development toolkit for Story Contracting's Pioneer programme."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:ital,wght@0,700;0,800;1,800&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;background:#EAF4FB;font-family:'Barlow',system-ui,sans-serif;color:#333}
#app{min-height:100vh}

/* ── Welcome overlay ─────────────────────────────────────── */
.welcome-overlay{position:fixed;inset:0;z-index:100;background:#EAF4FB;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:opacity .4s ease,visibility .4s ease}
.welcome-overlay.dismissed{opacity:0;visibility:hidden;pointer-events:none}
.welcome-inner{text-align:center;max-width:520px;padding:32px;animation:fadeIn .6s ease both}
.welcome-logo{margin:0 auto 28px}
.welcome-logo svg{height:46px;width:auto}
.welcome-eyebrow{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;letter-spacing:.28em;text-transform:uppercase;color:#0061AD;margin-bottom:12px;opacity:.85}
.welcome-title{font-family:'Barlow Condensed','Arial Narrow',sans-serif;font-size:64px;font-weight:800;color:#004B86;letter-spacing:-.02em;line-height:1}
.welcome-sub{color:#666;font-size:16px;line-height:1.7;margin-top:18px;max-width:460px;margin-left:auto;margin-right:auto}
.welcome-btn{display:inline-flex;align-items:center;gap:10px;margin-top:30px;background:#0061AD;color:white;border:none;border-radius:24px;padding:14px 32px;font-family:'Barlow',sans-serif;font-weight:700;font-size:16px;cursor:pointer;box-shadow:0 8px 28px rgba(0,97,173,.25);transition:transform .15s ease,box-shadow .15s ease}
.welcome-btn:hover{transform:translateY(-2px);box-shadow:0 12px 36px rgba(0,97,173,.35)}
.welcome-btn:active{transform:scale(.97)}
.welcome-pulse{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.8);animation:pulse 1.8s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.4;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}

/* ── Page transitions ────────────────────────────────────── */
.page{min-height:100vh;animation:pageIn .32s ease both}
@keyframes pageIn{from{opacity:0;transform:translateX(28px)}to{opacity:1;transform:translateX(0)}}
.page-home{animation:fadeIn .28s ease both}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* ── Header ──────────────────────────────────────────────── */
.header{display:flex;align-items:center;justify-content:space-between;padding:14px 32px}
.header-left{display:flex;align-items:center;gap:16px}
.divider{width:1px;height:28px;background:#c8d8e8}
.tag{font-size:12px;font-weight:600;color:#8fa0b0;letter-spacing:.2em;text-transform:uppercase}
.header-right{display:flex;align-items:center;gap:12px}
.as-logo{height:34px;position:relative;overflow:hidden;border-radius:3px}
.as-logo::before{content:'';position:absolute;top:-50%;left:-75%;width:50%;height:200%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.18),transparent);transform:skewX(-20deg);animation:asShimmer 4.5s 2s ease-in-out infinite;z-index:1}
@keyframes asShimmer{0%{left:-75%}100%{left:150%}}
.as-logo svg{height:34px;width:auto;border-radius:3px;display:block}
.logo{display:inline-flex;align-items:center;justify-content:center;height:40px}
.logo svg{height:36px;width:auto}

/* ── Container ───────────────────────────────────────────── */
.container{max-width:1200px;margin:0 auto;padding:4px 32px 48px}
.center-block{text-align:center;max-width:660px;margin:0 auto 24px}
.title{font-family:'Barlow Condensed','Arial Narrow',sans-serif;font-size:52px;font-weight:800;color:#004B86;letter-spacing:-.02em;line-height:1.05}
.subtitle{color:#666;font-size:16px;line-height:1.75;margin-top:14px}

/* ── Wheel layout ────────────────────────────────────────── */
.wheel-layout{display:flex;gap:28px;align-items:flex-start;justify-content:center}
.wheel-col{flex:0 0 auto;width:min(620px,90vw)}
.info-col{flex:1;min-width:280px;max-width:380px;display:flex;flex-direction:column;gap:20px}
.card{background:white;border-radius:28px;padding:28px;box-shadow:0 6px 24px rgba(0,97,173,.07)}
.card h2{font-family:'Barlow Condensed','Arial Narrow',sans-serif;font-size:22px;font-weight:800;color:#004B86;margin-bottom:12px}
.card p{color:#666;line-height:1.75;font-size:14.5px}
.card .eyebrow{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:#0061AD;margin-bottom:8px;opacity:.85}

/* ── Wheel wrap ──────────────────────────────────────────── */
.wheel-wrap{position:relative;width:100%;background:white;border-radius:28px;padding:16px 16px 0;box-shadow:0 16px 48px rgba(0,97,173,.13),0 2px 12px rgba(0,0,0,.05);overflow:hidden}
.wheel-svg-container{position:relative;width:100%;padding-bottom:100%}
.wheel-svg-container>svg{position:absolute;top:0;left:0;width:100%;height:100%}
.wheel-svg-container>#overlay-svg{z-index:2;cursor:pointer}
.wheel-svg-container>#main-wheel{z-index:1}

/* Overlay wedges: dim the non-active segments when one is hovered */
.ov-wedge{fill:transparent;stroke:transparent;transition:fill .22s ease}
.wheel-svg-container.has-hover .ov-wedge{fill:rgba(10,30,60,0.55)}
.wheel-svg-container.has-hover .ov-wedge.active{fill:transparent}

/* Centre hub overlay (the Crux) */
.hub-circle{fill:transparent;cursor:pointer}
.hub-ring{fill:none;stroke:rgba(255,255,255,0);stroke-width:0;pointer-events:none;transition:stroke .3s ease, stroke-width .3s ease}
.hub-ring-outer{fill:none;stroke:rgba(255,255,255,0);stroke-width:0;pointer-events:none;transition:stroke .3s ease}
.hub-hovered .hub-ring{stroke:rgba(255,255,255,.7);stroke-width:8;animation:hubPulse 1.6s ease-in-out infinite}
.hub-hovered .hub-ring-outer{stroke:rgba(255,255,255,.25);stroke-width:5;animation:hubPulseOuter 1.6s ease-in-out infinite}
@keyframes hubPulse{0%,100%{stroke-width:6;stroke:rgba(255,255,255,.5)}50%{stroke-width:10;stroke:rgba(255,255,255,.85)}}
@keyframes hubPulseOuter{0%,100%{stroke-width:3;stroke:rgba(255,255,255,.18)}50%{stroke-width:6;stroke:rgba(255,255,255,.38)}}

/* ── Hover bar ───────────────────────────────────────────── */
.hover-bar{height:74px;margin:8px -16px 0;border-radius:0 0 28px 28px;display:flex;align-items:center;justify-content:center;padding:10px 20px;transition:all .25s ease;overflow:hidden}
.hover-bar.idle{background:#f0f6fc}
.hover-bar.active{background:#0061AD}
.hover-bar-content{text-align:center;transition:opacity .18s ease;width:100%}
.hover-bar .step-label{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;letter-spacing:.18em;text-transform:uppercase;margin-bottom:4px}
.hover-bar .skill-label{font-weight:600;font-size:16px;line-height:1.25}
.hover-bar .idle-text{color:#8fa0b0;font-size:13.5px;font-weight:500;line-height:1.6}
.hover-bar .click-hint{font-size:10px;letter-spacing:.16em;text-transform:uppercase;margin-top:4px;opacity:0.5}

/* ── Back button (for placeholder pages) ─────────────────── */
.back-btn{display:inline-flex;align-items:center;gap:8px;background:white;border:none;border-radius:20px;padding:10px 18px;cursor:pointer;font-family:'Barlow',sans-serif;font-weight:600;font-size:14px;color:#004B86;box-shadow:0 4px 16px rgba(0,97,173,.12);transition:transform .15s ease;margin-bottom:24px}
.back-btn:hover{transform:translateY(-2px)}
.back-btn:active{transform:scale(.97)}

/* ── Placeholder coming-soon page ────────────────────────── */
.placeholder{max-width:680px;margin:60px auto;background:white;border-radius:28px;padding:48px 44px;box-shadow:0 16px 48px rgba(0,97,173,.10);text-align:center}
.placeholder .eyebrow{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;letter-spacing:.22em;text-transform:uppercase;color:#0061AD;margin-bottom:10px}
.placeholder h1{font-family:'Barlow Condensed',sans-serif;font-size:38px;font-weight:800;color:#004B86;margin-bottom:14px;line-height:1.1}
.placeholder p{color:#666;font-size:15.5px;line-height:1.75;margin-bottom:18px}
.placeholder .tagline{font-style:italic;color:#0061AD;font-size:15px;margin-bottom:24px}

/* ── Detail pages ────────────────────────────────────────── */
.hero{position:relative;border-radius:28px;padding:44px 48px;color:white;overflow:hidden;box-shadow:0 16px 48px rgba(0,40,80,.18)}
.hero-blob1{position:absolute;top:-70px;right:-50px;width:260px;height:260px;border-radius:50%;background:rgba(255,255,255,.08)}
.hero-blob2{position:absolute;bottom:-90px;right:120px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.06)}
.hero-eyebrow{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;letter-spacing:.24em;text-transform:uppercase;opacity:.75;margin-bottom:8px}
.hero h1{font-family:'Barlow Condensed','Arial Narrow',sans-serif;font-size:46px;font-weight:800;line-height:1.05;letter-spacing:-.01em;margin-bottom:10px}
.hero .hero-tagline{font-style:italic;font-size:16px;opacity:.85;margin-bottom:14px}
.hero .hero-desc{font-size:15.5px;line-height:1.7;max-width:720px;opacity:.94}
.detail-grid{display:grid;grid-template-columns:minmax(0,1.55fr) minmax(0,1fr);gap:20px;margin-top:20px;align-items:start}
.detail-main,.detail-side{display:flex;flex-direction:column;gap:20px;min-width:0}
.model-card h2{font-size:24px}
.model-visual{margin:18px 0 6px;background:#f6fafd;border-radius:18px;padding:18px}
.model-visual svg{width:100%;height:auto;display:block}
.takeaway-list{list-style:none;margin-top:4px}
.takeaway-list li{display:flex;gap:12px;align-items:flex-start;padding:10px 0;color:#555;font-size:14.5px;line-height:1.65}
.takeaway-list li+li{border-top:1px solid #eef4f9}
.tk-num{flex:0 0 26px;height:26px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;color:white;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:14px;margin-top:2px}
.note-card{border-radius:28px;padding:26px 28px;color:white;box-shadow:0 10px 30px rgba(0,40,80,.16)}
.note-card h3{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;margin-bottom:8px}
.note-card p{font-size:14px;line-height:1.7;opacity:.94}
.book-card{display:flex;align-items:center;gap:16px}
.book-icon{flex:0 0 46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;background:#f0f6fc}
.book-icon svg{animation:bookBob 3.2s ease-in-out infinite}
@keyframes bookBob{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-3px) rotate(-3deg)}}
.book-card .book-label{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:#8fa0b0}
.book-card .book-pages{font-weight:700;color:#004B86;font-size:16px;margin-top:2px}
.quote-card p.q{font-style:italic;color:#0061AD;font-size:15px;line-height:1.65;margin-bottom:8px}
.quote-card p.qa{font-size:13px;color:#8fa0b0}
.scroll-cue{display:flex;flex-direction:column;align-items:center;gap:4px;margin:34px 0 10px;color:#8fa0b0;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;letter-spacing:.22em;text-transform:uppercase}
.scroll-cue svg{animation:cueDip 1.8s ease-in-out infinite}
@keyframes cueDip{0%,100%{transform:translateY(0);opacity:.5}50%{transform:translateY(5px);opacity:1}}
/* ── Interactive tool shared ─────────────────────────────── */
.tool-card{background:white;border-radius:28px;padding:34px 36px;box-shadow:0 16px 48px rgba(0,97,173,.10);margin-top:8px}
.tool-card>.eyebrow{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:12px;letter-spacing:.22em;text-transform:uppercase;margin-bottom:6px}
.tool-card h2{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:800;color:#004B86;margin-bottom:10px;line-height:1.1}
.tool-card .tool-intro{color:#666;font-size:14.5px;line-height:1.7;max-width:760px;margin-bottom:20px}
.tool-btn{display:inline-flex;align-items:center;gap:9px;border:none;border-radius:22px;padding:12px 26px;font-family:'Barlow',sans-serif;font-weight:700;font-size:15px;color:white;cursor:pointer;box-shadow:0 8px 24px rgba(0,60,120,.22);transition:transform .15s ease,box-shadow .15s ease}
.tool-btn:hover{transform:translateY(-2px)}
.tool-btn:active{transform:scale(.97)}
.tool-btn.secondary{background:#eef4f9;color:#004B86;box-shadow:none}
.tool-field label{display:block;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:#004B86;margin-bottom:6px}
.tool-field input[type=text],.tool-field textarea{width:100%;border:1.5px solid #d5e3ef;border-radius:12px;padding:11px 14px;font-family:'Barlow',sans-serif;font-size:14.5px;color:#333;background:#fbfdff;resize:vertical;transition:border-color .15s ease}
.tool-field input[type=text]:focus,.tool-field textarea:focus{outline:none;border-color:#0061AD}
/* Work Victim Scale */
.wvs-row{display:flex;align-items:center;gap:14px;padding:10px 12px;border-radius:12px}
.wvs-row:nth-child(odd){background:#f7fafd}
.wvs-stmt{flex:1;font-size:14.5px;color:#444;line-height:1.5}
.wvs-stmt .n{color:#8fa0b0;font-weight:700;margin-right:6px}
.wvs-opts{display:flex;gap:5px;flex:0 0 auto}
.wvs-opt{width:44px;height:32px;border-radius:8px;border:1.5px solid #d5e3ef;background:white;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:12px;color:#8fa0b0;transition:all .13s ease}
.wvs-opt:hover{border-color:#0061AD;color:#0061AD}
.wvs-opt.sel{background:#0061AD;border-color:#0061AD;color:white}
.wvs-head{display:flex;align-items:center;gap:14px;padding:4px 12px 8px}
.wvs-head .wvs-stmt{font-family:'Barlow Condensed',sans-serif;font-weight:800;letter-spacing:.06em;text-transform:uppercase;font-size:12px;color:#8fa0b0}
.wvs-head .wvs-opts span{width:44px;text-align:center;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:11px;color:#8fa0b0;letter-spacing:.02em}
.wvs-result{border-radius:18px;padding:22px 26px;margin-top:22px;background:#f0f6fc;transition:background .3s ease}
.wvs-result .score{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:34px;color:#004B86;line-height:1}
.wvs-result .verdict{font-size:14.5px;color:#555;line-height:1.65;margin-top:8px}
/* Worksheet sections (Me PLC, Workload Audit) */
.ws-section{border:1.5px solid #e4eef7;border-radius:18px;padding:20px 22px;margin-bottom:16px;background:#fdfeff}
.ws-section .ws-tag{display:inline-block;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:white;border-radius:8px;padding:3px 10px;margin-bottom:8px}
.ws-section h3{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;color:#004B86;margin-bottom:6px}
.ws-section .ws-prompt{color:#666;font-size:13.5px;line-height:1.65;margin-bottom:12px}
.ws-section textarea{width:100%;border:1.5px solid #d5e3ef;border-radius:12px;padding:11px 14px;font-family:'Barlow',sans-serif;font-size:14.5px;color:#333;background:white;min-height:84px;resize:vertical}
.ws-section textarea:focus{outline:none;border-color:#0061AD}
/* Workload audit toggles */
.wla-item{display:flex;align-items:flex-start;gap:12px;padding:10px 12px;border-radius:12px;cursor:pointer;transition:background .12s ease}
.wla-item:hover{background:#f4f9fd}
.wla-check{flex:0 0 24px;height:24px;border-radius:8px;border:2px solid #c7d9e8;background:white;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .13s ease}
.wla-item.on .wla-check{background:#009FA0;border-color:#009FA0}
.wla-check svg{opacity:0;transition:opacity .13s ease}
.wla-item.on .wla-check svg{opacity:1}
.wla-body b{display:block;color:#004B86;font-size:14.5px;margin-bottom:1px}
.wla-body span{color:#777;font-size:13px;line-height:1.5}
/* Decision tree (Problem-Solving Navigator) */
.psn-stage{background:#f7fafd;border-radius:18px;padding:26px 28px;min-height:150px}
.psn-q{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;color:#004B86;line-height:1.15;margin-bottom:6px}
.psn-sub{color:#666;font-size:14px;line-height:1.65;margin-bottom:18px;max-width:640px}
.psn-btns{display:flex;gap:10px;flex-wrap:wrap}
.psn-outcome{border-radius:18px;padding:26px 28px;color:white}
.psn-outcome h3{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;margin-bottom:8px}
.psn-outcome p{font-size:14.5px;line-height:1.7;opacity:.95;max-width:640px}
.psn-crumbs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.psn-crumb{background:#eef4f9;border-radius:16px;padding:5px 12px;font-size:12.5px;color:#4a6d8c;font-weight:600}
.psn-crumb b{color:#004B86}
/* ── Magnify toggle button (per the Liberator) ───────────── */
.magnify-btn{display:inline-flex;align-items:center;gap:7px;background:#fff8f0;border:2px solid #f5a84e;border-radius:20px;padding:8px 14px;cursor:pointer;font-family:'Barlow',sans-serif;font-weight:600;font-size:13px;color:#b05e00;box-shadow:0 4px 16px rgba(245,168,78,.12);transition:all .18s ease;white-space:nowrap}
.magnify-btn:hover{border-color:#e07b00;background:#fef0dc;transform:translateY(-2px)}
.magnify-btn.active{background:#f5a84e;border-color:#e07b00;color:white;box-shadow:0 4px 16px rgba(245,168,78,.35)}
.magnify-btn svg{flex-shrink:0;transition:transform .18s ease}
.magnify-btn:hover svg{transform:scale(1.1)}
.detail-btn-row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-start}
.detail-btn-row .magnify-btn{margin-bottom:24px}

/* Large text mode: toggled by .text-lg on the .page element */
.text-lg .hero h1{font-size:50px}
.text-lg .hero .hero-tagline{font-size:18px}
.text-lg .hero .hero-desc{font-size:17px;line-height:1.7}
.text-lg .hero-eyebrow{font-size:14px}
.text-lg .card .eyebrow{font-size:13px}
.text-lg .card h2{font-size:25px}
.text-lg .model-card h2{font-size:28px}
.text-lg .card p{font-size:16px;line-height:1.7}
.text-lg .takeaway-list li{font-size:16px}
.text-lg .note-card h3{font-size:22px}
.text-lg .note-card p{font-size:15.5px;line-height:1.75}
.text-lg .quote-card p.q{font-size:17px}
.text-lg .quote-card p.qa{font-size:14.5px}
.text-lg .book-card .book-label{font-size:13px}
.text-lg .book-card .book-pages{font-size:18px}
.text-lg .tool-card h2{font-size:34px}
.text-lg .tool-card .tool-intro{font-size:16px;line-height:1.7}
.text-lg .wvs-stmt{font-size:16px}
.text-lg .wvs-result .verdict{font-size:16px}
.text-lg .tool-field label{font-size:14.5px}
.text-lg .tool-field input[type=text],.text-lg .tool-field textarea{font-size:16px}
.text-lg .psn-q{font-size:29px}
.text-lg .psn-sub{font-size:15.5px}
.text-lg .psn-outcome p{font-size:16px}
.text-lg .wla-body b{font-size:16px}
.text-lg .wla-body span{font-size:14.5px}
.text-lg .model-visual{zoom:1.14}

/* ── Back to top button (footer of detail pages) ─────────── */
.btt-wrap{display:flex;justify-content:center;margin:48px auto 24px;animation:bttFade .5s ease both;animation-delay:.2s;opacity:0}
@keyframes bttFade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.btt-btn{display:inline-flex;align-items:center;gap:9px;background:white;border:none;border-radius:24px;padding:11px 22px 11px 18px;cursor:pointer;font-family:'Barlow',sans-serif;font-weight:600;font-size:13.5px;color:#0061AD;box-shadow:0 4px 16px rgba(0,97,173,.10);transition:all .18s ease;letter-spacing:.02em}
.btt-btn:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(0,97,173,.18);color:#004B86}
.btt-btn:active{transform:scale(.97)}
.btt-btn svg{flex-shrink:0;transition:transform .18s ease}
.btt-btn:hover svg{transform:translateY(-2px)}

/* ── OK Corral puzzle (Skill 1) ──────────────────────────── */
.ok-puzzle-wrap{position:relative;width:100%;max-width:640px;margin:18px auto 8px;padding:6px 0}
.ok-puzzle-wrap::before{content:'';position:absolute;inset:-10px 8% auto 8%;height:65%;background:radial-gradient(ellipse 70% 100% at 50% 50%,rgba(0,97,173,.08),transparent 70%);pointer-events:none;z-index:0}
.ok-puzzle-stage{position:relative;width:100%;display:block;z-index:1}
.ok-puzzle-stage svg{width:100%;height:auto;display:block;overflow:visible;filter:drop-shadow(0 12px 26px rgba(0,75,134,.18))}
.ok-reveal{opacity:0;transform:translateY(28px) scale(.97);transition:opacity .85s cubic-bezier(.22,.6,.25,1),transform .85s cubic-bezier(.22,.6,.25,1);will-change:opacity,transform}
.ok-reveal.is-revealed{opacity:1;transform:translateY(0) scale(1)}
.ok-puzzle-stage svg #Blocks rect{cursor:pointer;transform-box:fill-box;transform-origin:center;transition:transform .25s cubic-bezier(.4,1.4,.6,1),opacity .25s ease,filter .25s ease}
.ok-puzzle-stage svg #Blocks rect:hover{transform:scale(1.06);filter:brightness(1.10)}
.ok-puzzle-stage.has-active svg #Blocks rect{opacity:.32}
.ok-puzzle-stage.has-active svg #Blocks rect.is-active{opacity:1;transform:scale(1.08);filter:drop-shadow(0 6px 14px rgba(0,40,75,.45))}
.ok-puzzle-stage svg .ok-corner{transition:opacity .25s ease}
.ok-puzzle-stage.has-active svg .ok-corner{opacity:.38}
.ok-puzzle-stage.has-active svg .ok-corner.is-active{opacity:1}
.ok-puzzle-beacon{fill:none;stroke:#ffffff;stroke-width:2.5;opacity:0;pointer-events:none;transform-box:fill-box;transform-origin:center;animation:okBeaconPulse 2.6s ease-out infinite}
.ok-puzzle-beacon[data-pos-key="top"]{animation-delay:0s}
.ok-puzzle-beacon[data-pos-key="right"]{animation-delay:0.65s}
.ok-puzzle-beacon[data-pos-key="bottom"]{animation-delay:1.3s}
.ok-puzzle-beacon[data-pos-key="left"]{animation-delay:1.95s}
.ok-puzzle-stage.has-active .ok-puzzle-beacon{animation:none;opacity:0;transition:opacity .4s ease}
@keyframes okBeaconPulse{0%{opacity:0;transform:scale(1)}12%{opacity:.95}100%{opacity:0;transform:scale(1.20)}}
.ok-puzzle-hint{text-align:center;font-size:12px;font-weight:600;letter-spacing:.04em;color:#5a6c7c;margin:14px auto 0;max-width:520px;font-style:italic}

/* Position detail panel below the puzzle (shared with the 5 Styles model) */
.ok-detail-panel{position:relative;width:100%;max-width:680px;margin:18px auto 6px;background:linear-gradient(180deg,#ffffff,#f6fbfe);border:1px solid #d8e7f1;border-radius:18px;padding:22px 26px;box-shadow:0 8px 22px rgba(0,75,134,.10);min-height:140px;transition:border-color .25s ease,box-shadow .25s ease}
.ok-detail-panel.is-goal{border-color:#cdebd8;box-shadow:0 8px 22px rgba(26,138,74,.14)}
.ok-detail-empty{text-align:center;color:#7e8a98;font-size:13.5px;line-height:1.65;padding:22px 6px 18px}
.ok-detail-empty-icon{margin:0 auto 10px;width:36px;height:36px;border-radius:50%;background:#eaf2f9;color:#0061AD;display:flex;align-items:center;justify-content:center}
.ok-detail-content{display:none;animation:okDetailIn .35s ease both}
.ok-detail-content.is-shown{display:block}
@keyframes okDetailIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.ok-detail-head{display:flex;align-items:flex-start;gap:14px;margin-bottom:12px;flex-wrap:wrap}
.ok-detail-code{font-family:'Barlow Condensed','Arial Narrow',sans-serif;font-weight:800;font-size:32px;color:#003E70;letter-spacing:.01em;line-height:1;background:#eaf2f9;border-radius:10px;padding:8px 14px;flex-shrink:0}
.ok-detail-panel.is-goal .ok-detail-code{background:#dff3e6;color:#0f6a37}
.ok-detail-titlewrap{flex:1;min-width:0}
.ok-detail-title{font-family:'Barlow Condensed','Arial Narrow',sans-serif;font-size:23px;font-weight:800;color:#004B86;letter-spacing:-.005em;line-height:1.2;margin-bottom:4px}
.ok-detail-axis{font-family:'Barlow Condensed','Arial Narrow',sans-serif;font-size:11.5px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:#0061AD}
.ok-detail-panel.is-goal .ok-detail-axis{color:#0f6a37}
.ok-detail-body{font-size:14.5px;line-height:1.7;color:#3a4858;margin:0}
.ok-detail-goal-tag{display:inline-flex;align-items:center;gap:6px;background:#1a8a4a;color:white;font-family:'Barlow Condensed','Arial Narrow',sans-serif;font-size:11px;font-weight:800;letter-spacing:.16em;padding:4px 10px;border-radius:999px;margin-top:10px;text-transform:uppercase}
.text-lg .ok-detail-code{font-size:36px}
.text-lg .ok-detail-title{font-size:26px}
.text-lg .ok-detail-axis{font-size:13px}
.text-lg .ok-detail-body{font-size:16.5px}
.text-lg .ok-detail-empty{font-size:15px}
.text-lg .ok-puzzle-hint{font-size:14px}

/* Wait head: line-drawn profile with four thought bubbles */
.ok-wait-figure{max-width:480px;margin:26px auto 8px;text-align:center}
.ok-wait-head{position:relative;width:100%;max-width:420px;margin:0 auto;aspect-ratio:10/7;background:#fcfaf6;border-radius:14px;padding:8px 14px;box-sizing:border-box;box-shadow:0 6px 18px rgba(0,0,0,.14),inset 0 0 0 1px rgba(255,255,255,.55)}
.ok-wait-head svg{width:100%;height:100%;display:block}
.ok-wait-caption{font-size:13px;line-height:1.6;color:#5a6c7c;font-style:italic;margin:12px auto 0;max-width:400px}
.text-lg .ok-wait-caption{font-size:15px}

/* ── The five Negotiation Styles, interactive (Skill 3) ──── */
.ns-wrap{position:relative;width:100%;max-width:640px;margin:18px auto 8px;padding:6px 0}
.ns-stage{position:relative;width:100%;display:block;background:#f6fafd;border-radius:18px;padding:16px 12px 10px}
.ns-stage svg{width:100%;height:auto;display:block;overflow:visible}
.ns-stage svg g[data-key]{cursor:pointer;transition:opacity .25s ease}
.ns-stage svg g[data-key] rect{transform-box:fill-box;transform-origin:center;transition:transform .25s cubic-bezier(.4,1.4,.6,1),filter .25s ease}
.ns-stage svg g[data-key]:hover rect{transform:scale(1.045);filter:brightness(1.06)}
.ns-stage.has-active svg g[data-key]{opacity:.35}
.ns-stage.has-active svg g[data-key].is-active{opacity:1}
.ns-stage.has-active svg g[data-key].is-active rect{transform:scale(1.06);filter:drop-shadow(0 6px 14px rgba(120,60,0,.30))}

/* ── The Motivation Inventory, interactive (Skill 7) ──────── */
.mi-cols{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:18px auto 0;max-width:680px}
.mi-col{background:#f6fafd;border:1px solid #e0ecf5;border-radius:16px;padding:14px 12px 12px}
.mi-col-head{text-align:center;margin-bottom:10px}
.mi-col-head h4{font-family:'Barlow Condensed','Arial Narrow',sans-serif;font-weight:800;font-size:16px;letter-spacing:.14em;color:#004B86;text-transform:uppercase}
.mi-col-head .mi-strap{font-size:11px;font-style:italic;color:#5a6c7c;margin-top:1px}
.mi-chip{position:relative;display:block;width:100%;text-align:left;border:1.5px solid #d5e3ef;background:white;border-radius:10px;padding:7px 30px 7px 11px;margin-bottom:7px;font-family:'Barlow',sans-serif;font-size:13px;font-weight:600;color:#2c4763;cursor:pointer;transition:border-color .2s ease,box-shadow .2s ease,transform .2s cubic-bezier(.4,1.4,.6,1)}
.mi-chip:last-child{margin-bottom:0}
.mi-chip:hover{border-color:#8fb8d9;transform:translateY(-1px);box-shadow:0 4px 10px rgba(0,75,134,.10)}
.mi-chip:focus-visible{outline:2.5px solid #0061AD;outline-offset:2px}
.mi-chip.is-open{border-color:#0061AD;box-shadow:0 4px 12px rgba(0,97,173,.16)}
.mi-chip .mi-badge{display:none;position:absolute;right:7px;top:50%;transform:translateY(-50%);width:20px;height:20px;border-radius:50%;color:white;font-family:'Barlow Condensed','Arial Narrow',sans-serif;font-weight:800;font-size:12px;line-height:20px;text-align:center}
.mi-chip.is-picked .mi-badge{display:block}
.mi-slots{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:18px auto 0;max-width:680px}
.mi-slot{flex:1;min-width:150px;background:white;border:1.5px dashed #c3d8e9;border-radius:14px;padding:10px 14px;text-align:center;transition:border-color .25s ease,background .25s ease}
.mi-slot.is-filled{border-style:solid;background:#f2f8fd}
.mi-slot .mi-slot-rank{font-family:'Barlow Condensed','Arial Narrow',sans-serif;font-weight:800;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#5a6c7c}
.mi-slot .mi-slot-name{font-family:'Barlow Condensed','Arial Narrow',sans-serif;font-weight:800;font-size:19px;color:#004B86;line-height:1.15;margin-top:2px;min-height:22px}
.mi-slot .mi-slot-cat{font-size:11px;font-style:italic;color:#5a6c7c;margin-top:1px;min-height:14px}
.mi-interp{max-width:680px;margin:16px auto 0;background:linear-gradient(180deg,#ffffff,#f4faf6);border:1px solid #cdebd8;border-radius:16px;padding:18px 22px;display:none;animation:okDetailIn .35s ease both}
.mi-interp.is-shown{display:block}
.mi-interp h4{font-family:'Barlow Condensed','Arial Narrow',sans-serif;font-weight:800;font-size:18px;color:#0f6a37;margin-bottom:6px}
.mi-interp p{font-size:13.5px;line-height:1.65;color:#3a4858;margin:0 0 8px}
.mi-interp p:last-child{margin-bottom:0}
.mi-pick-btn{display:inline-flex;align-items:center;gap:7px;margin-top:12px;border:none;border-radius:999px;padding:8px 18px;font-family:'Barlow Condensed','Arial Narrow',sans-serif;font-weight:800;font-size:13px;letter-spacing:.1em;text-transform:uppercase;color:white;cursor:pointer;transition:transform .2s ease,box-shadow .2s ease}
.mi-pick-btn:hover{transform:translateY(-1px);box-shadow:0 6px 14px rgba(0,75,134,.22)}
.mi-pick-btn.is-remove{background:#8a2c2c !important}
@media (max-width:640px){.mi-cols{grid-template-columns:1fr}}
.text-lg .mi-chip{font-size:15px}
.text-lg .mi-col-head .mi-strap{font-size:13px}
.text-lg .mi-interp p{font-size:15.5px}

/* ── Hero line artwork (Seeks Clarity ear) ────────────────── */
.hero-art{margin:22px 0 2px}
.hero-art svg{width:132px;height:auto;overflow:visible;display:block}
.hero-art svg path{stroke:rgba(255,255,255,.94);stroke-dasharray:1;stroke-dashoffset:1;animation:heroArtDraw 3s ease-out .4s forwards}
@keyframes heroArtDraw{to{stroke-dashoffset:0}}
@media (prefers-reduced-motion: reduce){
  .ok-puzzle-stage svg #Blocks rect{transition:opacity .15s ease}
  .ok-detail-content{animation:none}
  .ok-puzzle-beacon{animation:none;opacity:0}
  .ok-reveal{transition:opacity .35s ease;transform:none}
  .ok-reveal:not(.is-revealed){transform:none}
  .btt-wrap{animation:none;opacity:1}
  .ns-stage svg g[data-key] rect{transition:none}
  .hero-art svg path{animation:none;stroke-dashoffset:0}
}

/* ── Negotiation Strategy Planner (Skill 3) ──────────────── */
.np-types{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.np-type{border:1.5px solid #d5e3ef;background:white;border-radius:18px;padding:8px 16px;font-family:'Barlow',sans-serif;font-weight:600;font-size:13.5px;color:#4a6d8c;cursor:pointer;transition:all .13s ease}
.np-type:hover{transform:translateY(-1px)}
.np-guidance{border-radius:14px;background:#fdf6ef;border:1px solid #f5dfc8;padding:14px 18px;font-size:13.5px;line-height:1.65;color:#7a4a12;margin-top:12px;display:none}
.np-guidance.on{display:block}
.np-step{margin-top:18px}
.np-step .np-step-head{display:flex;align-items:baseline;gap:10px;margin-bottom:6px}
.np-step .np-step-num{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:22px;line-height:1;color:white;border-radius:9px;padding:5px 10px}
.np-step .np-step-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:19px;color:#004B86}
.np-step .np-step-prompt{font-size:13.5px;line-height:1.6;color:#777;margin-bottom:8px;max-width:720px}
.text-lg .np-step .np-step-prompt{font-size:15.5px}
.text-lg .np-guidance{font-size:15.5px}
.text-lg .np-type{font-size:15.5px}

/* Detail responsive */
@media (max-width: 900px){
  .detail-grid{grid-template-columns:1fr}
  .hero{padding:32px 26px}
  .hero h1{font-size:36px}
  .tool-card{padding:24px 20px}
  .wvs-row{flex-direction:column;align-items:flex-start;gap:8px}
  .wvs-head{display:none}
  .wvs-opt{width:58px}
}

/* ── Responsive ──────────────────────────────────────────── */
@media (max-width: 900px){
  .wheel-layout{flex-direction:column;align-items:center}
  .info-col{max-width:620px;width:100%}
  .wheel-col{width:100%;max-width:620px}
  .title{font-size:42px}
  .welcome-title{font-size:48px}
  .header{padding:12px 18px}
  .container{padding:4px 18px 32px}
}

@media (prefers-reduced-motion: reduce){
  .welcome-pulse,.as-logo::before,.hub-ring,.hub-ring-outer{animation:none}
  .page,.page-home,.welcome-inner{animation:none}
}

// ── GEOMETRY ─────────────────────────────────────────────────
// Wheel viewBox is 671.54 x 671.74; centre 335.77, 335.83.
// Crux radius 92.33 (the dark blue centre circle).
// Inner edge of the dark outer ring sits around 286.33.
const CX = 335.77, CY = 335.83;
const R_HUB    = 92.33;   // Crux outer edge
const R_INNER  = 92.33;   // skill wedge inner radius
const R_OUTER  = 286.33;  // skill wedge outer radius (inside outer ring)

function polarXY(cx, cy, r, angleDeg){
  const rad = ((angleDeg - 90) * Math.PI) / 180;
  return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
}

function wedgePath(cx, cy, r0, r1, a0, a1){
  const p0 = polarXY(cx, cy, r1, a0);
  const p1 = polarXY(cx, cy, r1, a1);
  const p2 = polarXY(cx, cy, r0, a1);
  const p3 = polarXY(cx, cy, r0, a0);
  const large = (a1 - a0) > 180 ? 1 : 0;
  return `M${p0.x.toFixed(2)},${p0.y.toFixed(2)} A${r1},${r1} 0 ${large} 1 ${p1.x.toFixed(2)},${p1.y.toFixed(2)} L${p2.x.toFixed(2)},${p2.y.toFixed(2)} A${r0},${r0} 0 ${large} 0 ${p3.x.toFixed(2)},${p3.y.toFixed(2)} Z`;
}

// ── AUDIO ────────────────────────────────────────────────────
// Web Audio API throughout. Gain values kept low (0.015 to 0.025)
// to stay subtle and professional, matching the Wayfinder.
let audioCtx = null;
let audioReady = false;
function getCtx(){
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}
document.addEventListener('click', function initAudio(){
  getCtx(); audioReady = true;
  document.removeEventListener('click', initAudio);
}, {once: true});

function playShush(){
  try{
    const ctx=getCtx(), now=ctx.currentTime;
    const buf=ctx.createBuffer(1,Math.floor(ctx.sampleRate*.09),ctx.sampleRate);
    const d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
    const src=ctx.createBufferSource(); src.buffer=buf;
    const flt=ctx.createBiquadFilter(); flt.type='bandpass'; flt.frequency.value=3800; flt.Q.value=0.7;
    const g=ctx.createGain();
    g.gain.setValueAtTime(0,now); g.gain.linearRampToValueAtTime(.018,now+.008); g.gain.exponentialRampToValueAtTime(.0001,now+.09);
    src.connect(flt); flt.connect(g); g.connect(ctx.destination); src.start(now); src.stop(now+.1);
  }catch(e){}
}
function playChime(){
  try{
    const ctx=getCtx(), now=ctx.currentTime;
    [523.25,783.99].forEach((freq,i)=>{
      const osc=ctx.createOscillator(), g=ctx.createGain();
      osc.type='sine'; osc.frequency.value=freq;
      g.gain.setValueAtTime(0,now); g.gain.linearRampToValueAtTime(.025-i*.006,now+.01); g.gain.exponentialRampToValueAtTime(.0001,now+.7);
      osc.connect(g); g.connect(ctx.destination); osc.start(now); osc.stop(now+.75);
    });
  }catch(e){}
}
function playReturn(){
  try{
    const ctx=getCtx(), now=ctx.currentTime;
    [{f:783.99,d:0},{f:523.25,d:.09}].forEach(({f,d})=>{
      const osc=ctx.createOscillator(), g=ctx.createGain();
      osc.type='sine'; osc.frequency.value=f;
      g.gain.setValueAtTime(0,now+d); g.gain.linearRampToValueAtTime(.022,now+d+.01); g.gain.exponentialRampToValueAtTime(.0001,now+d+.55);
      osc.connect(g); g.connect(ctx.destination); osc.start(now+d); osc.stop(now+d+.6);
    });
  }catch(e){}
}

function playTextSizeClick(){

// ── ACCESSIBILITY BUTTONS (per the Liberator) ────────────────
function buildBackToTopButton(label){
  const wrap = document.createElement('div');
  wrap.className = 'btt-wrap';
  const btn = document.createElement('button');
  btn.className = 'btt-btn';
  btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg> ' + (label || 'Back to top');
  btn.addEventListener('click', () => {
    try { playReturn(); } catch(e) {}
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
  wrap.appendChild(btn);
  return wrap;
}

function buildMagnifyButton(page){
  const offIcon = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg> Larger text';
  const onIcon  = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg> Reset text';
  const btn = document.createElement('button');
  btn.className = 'magnify-btn';
  btn.title = 'Toggle larger text';
  btn.innerHTML = offIcon;
  btn.addEventListener('click', () => {
    try { playTextSizeClick(); } catch(e) {}
    const isActive = page.classList.toggle('text-lg');
    btn.classList.toggle('active', isActive);
    btn.innerHTML = isActive ? onIcon : offIcon;
  });
  return btn;
}

// ── OVERLAY SVG ──────────────────────────────────────────────
// Invisible interactive layer over the wheel. Seven wedges for
// the Skills, plus a centre hub for the Crux.
function buildOverlaySVG(onHover, onClick, onHoverHub, onClickHub){
  const NS = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(NS, 'svg');
  svg.setAttribute('id','overlay-svg');
  svg.setAttribute('viewBox','0 0 671.54 671.74');
  svg.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%';

  const wedgeEls = [];
  SEGMENTS.forEach(seg => {
    const path = document.createElementNS(NS, 'path');
    path.setAttribute('d', wedgePath(CX, CY, R_INNER, R_OUTER, seg.startAngle, seg.endAngle));
    path.setAttribute('class', 'ov-wedge');
    path.dataset.id = seg.id;
    path.addEventListener('mouseenter', () => onHover(seg.id));
    path.addEventListener('click', () => onClick(seg.id));
    svg.appendChild(path);
    wedgeEls.push(path);
  });

  // Centre hub overlay: outer pulse ring, inner pulse ring, hit circle
  const hubRingOuter = document.createElementNS(NS, 'circle');
  hubRingOuter.setAttribute('cx', CX); hubRingOuter.setAttribute('cy', CY);
  hubRingOuter.setAttribute('r', R_HUB + 10);
  hubRingOuter.setAttribute('class', 'hub-ring-outer');
  svg.appendChild(hubRingOuter);

  const hubRing = document.createElementNS(NS, 'circle');
  hubRing.setAttribute('cx', CX); hubRing.setAttribute('cy', CY);
  hubRing.setAttribute('r', R_HUB - 4);
  hubRing.setAttribute('class', 'hub-ring');
  svg.appendChild(hubRing);

  const hubCircle = document.createElementNS(NS, 'circle');
  hubCircle.setAttribute('cx', CX); hubCircle.setAttribute('cy', CY);
  hubCircle.setAttribute('r', R_HUB);
  hubCircle.setAttribute('class', 'hub-circle');
  hubCircle.addEventListener('mouseenter', () => {
    svg.classList.add('hub-hovered');
    onHoverHub(true);
  });
  hubCircle.addEventListener('mouseleave', () => {
    svg.classList.remove('hub-hovered');
    onHoverHub(false);
  });
  hubCircle.addEventListener('click', () => onClickHub());
  svg.appendChild(hubCircle);

  svg.addEventListener('mouseleave', () => { svg.classList.remove('hub-hovered'); onHover(null); });

  return { svg, wedgeEls };
}

// ── WHEEL PAGE (HOME) ────────────────────────────────────────
function buildWheelPage(onOpenSkill, onOpenCrux){
  const page = document.createElement('div');
  page.className = 'page page-home';
  page.style.background = '#EAF4FB';

  let hoveredId = null;

  // Hover bar
  const hoverBar = document.createElement('div');
  hoverBar.className = 'hover-bar idle';
  const hoverBarContent = document.createElement('div');
  hoverBarContent.className = 'hover-bar-content';
  hoverBarContent.innerHTML = '<div class="idle-text">Hover over the wheel to explore the seven Skills and the Crux at its centre</div>';
  hoverBar.appendChild(hoverBarContent);

  // Main wheel + overlay
  const wheelSVG = getWheelSVG();
  const container = document.createElement('div');
  container.className = 'wheel-svg-container';
  container.appendChild(wheelSVG);

  const { svg: overlaySVG, wedgeEls } = buildOverlaySVG(
    (id) => {
      if (id !== null && id !== hoveredId) playShush();
      hoveredId = id;

      if (id) {
        container.classList.add('has-hover');
        wedgeEls.forEach(w => w.classList.toggle('active', w.dataset.id === id));
        const seg = SEGMENTS.find(s => s.id === id);
        const stepLabel = STEPS[seg.step].label;
        const stepAccent = STEPS[seg.step].accent;
        hoverBar.className = 'hover-bar active';
        hoverBar.style.background = stepAccent;

const LISTENING_ELS=[
  {
    key:'attitude', num:'1', name:'Attitude',
    sub:'Genuine interest and Positive Regard',
    body:'Listening starts before a single word is spoken. Be genuinely interested in what is being said, and in the person saying it. Hold Positive Regard for them and be prepared to empathise with their situation. If your attitude is wrong, every technique that follows will ring hollow; if it is right, most of the rest follows naturally.'
  },
  {
    key:'concentration', num:'2', name:'Concentration',
    sub:'Tune into the thoughts behind the words',
    body:'Become attuned to the feelings and thoughts behind the words, not just the words themselves. Do not allow yourself to be distracted by outside events, or by your own thought processes. Rehearsing your reply while the other person is still speaking is the most common concentration failure of all.'
  },
  {
    key:'nonverbal', num:'3', name:'Non-verbal behaviours',
    sub:'Posture, eye contact, small acknowledgements',
    body:'Show you are listening with your whole body. Keep your posture alert and attentive, without invading personal space. Offer eye contact that is present and engaged, neither glassy nor boring into the speaker. Nods and small acknowledgements tell the other person it is safe to keep going.'
  },
  {
    key:'reflectback', num:'4', name:'Reflecting back',
    sub:'Rephrase what you heard in your own words',
    body:'Rephrase what the speaker has said in your own words: “As I understand it, what you’re saying is...”. Avoid parrot-fashion repetition. The value comes from proving the message has actually landed, and from giving the speaker the chance to correct you if it has not.'
  },
  {
    key:'reflectfeel', num:'5', name:'Reflecting feelings',
    sub:'Name the emotion you sense, and test it',
    body:'Pick up the emotional content beneath what is being said, then test the accuracy of your perception. Name what you sense without imposing it: “It sounds as though that left you frustrated?”. Done gently, this is the deepest form of listening, and it often unlocks what the conversation is really about.',
    isGoal:true
  }
];

function buildListeningInteractive(accent){
  const wrap=document.createElement('div');
  wrap.className='ns-wrap';

  let svg='<svg viewBox="0 0 560 275" xmlns="http://www.w3.org/2000/svg" role="group" aria-label="The five elements of Active and Effective Listening. Tap an element to read more.">';
  LISTENING_ELS.forEach((e,i)=>{
    const y=10+i*52, w=330+i*46;
    svg+=`<g data-key="${e.key}" role="button" tabindex="0" aria-label="${e.num}. ${e.name}. Tap to read more.">`;
    svg+=`<rect x="10" y="${y}" width="${w}" height="44" rx="12" fill="${i===4?accent:'#c8dcec'}" opacity="${0.55+i*0.11}"/>`;
    svg+=`<text x="26" y="${y+21}" font-family="Barlow Condensed,sans-serif" font-weight="800" font-size="15.5" fill="${i===4?'#fff':'#1d466e'}" pointer-events="none">${e.num}. ${e.name}</text>`;
    svg+=`<text x="26" y="${y+36}" font-family="Barlow,sans-serif" font-size="11.5" fill="${i===4?'rgba(255,255,255,.9)':'#3d608a'}" pointer-events="none">${e.sub}</text>`;
    svg+='</g>';
  });
  svg+='</svg>';

  const stage=document.createElement('div');
  stage.className='ns-stage';
  stage.innerHTML=svg;
  wrap.appendChild(stage);

  const hint=document.createElement('p');
  hint.className='ok-puzzle-hint';
  hint.textContent='Tap any of the five elements to see what it asks of you in practice.';
  wrap.appendChild(hint);

  const detail=document.createElement('div');
  detail.className='ok-detail-panel';
  detail.setAttribute('role','region');
  detail.setAttribute('aria-live','polite');

  const empty=document.createElement('div');
  empty.className='ok-detail-empty';
  empty.innerHTML='<div class="ok-detail-empty-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M8 10h.01"/><path d="M12 10h.01"/><path d="M16 10h.01"/><path d="M9 16l-4 4V6a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2z"/></svg></div><p>Tap an element above to reveal what it asks of you in practice.</p>';
  detail.appendChild(empty);

  const content=document.createElement('div');
  content.className='ok-detail-content';
  detail.appendChild(content);
  wrap.appendChild(detail);

  const groups=stage.querySelectorAll('svg g[data-key]');

  function activate(key){
    const el=LISTENING_ELS.find(e=>e.key===key);
    if(!el) return;
    const wasOpen=stage.classList.contains('has-active');
    try{ playChime(); }catch(e){}
    stage.classList.add('has-active');
    groups.forEach(g=>g.classList.toggle('is-active',g.getAttribute('data-key')===key));
    detail.classList.toggle('is-goal',!!el.isGoal);
    empty.style.display='none';
    content.classList.remove('is-shown');
    void content.offsetWidth;
    const goalTag=el.isGoal
      ? '<span class="ok-detail-goal-tag"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> The deepest form of listening</span>'
      : '';
    content.innerHTML=
      '<div class="ok-detail-head">'+
        '<span class="ok-detail-code">'+el.num+' of 5</span>'+
        '<div class="ok-detail-titlewrap">'+
          '<h3 class="ok-detail-title">'+el.name+'</h3>'+
          '<p class="ok-detail-axis">'+el.sub+'</p>'+
        '</div>'+
      '</div>'+
      '<p class="ok-detail-body">'+el.body+'</p>'+
      goalTag;
    content.classList.add('is-shown');
    centreScrollOnRange(stage,detail,wasOpen?60:350);
  }

  groups.forEach(g=>{
    const key=g.getAttribute('data-key');
    g.addEventListener('click',()=>activate(key));
    g.addEventListener('keydown',e=>{
      if(e.key==='Enter'||e.key===' '){ e.preventDefault(); activate(key); }
    });
  });

  return wrap;
}

  wrap.appendChild(detail);

  const slots=document.createElement('div');
  slots.className='mi-slots';
  MI_RANKS.forEach(r=>{
    const s=document.createElement('div');
    s.className='mi-slot';
    s.innerHTML=`<div class="mi-slot-rank">${r}</div><div class="mi-slot-name">—</div><div class="mi-slot-cat"></div>`;
    slots.appendChild(s);
  });
  wrap.appendChild(slots);

  const interp=document.createElement('div');
  interp.className='mi-interp';
  interp.setAttribute('aria-live','polite');
  wrap.appendChild(interp);

  function refresh(){
    // badges
    wrap.querySelectorAll('.mi-chip').forEach(chip=>{
      const idx=picks.indexOf(chip.getAttribute('data-key'));
      chip.classList.toggle('is-picked',idx>-1);
      if(idx>-1) chip.querySelector('.mi-badge').textContent=String(idx+1);
    });
    // slots
    slots.querySelectorAll('.mi-slot').forEach((s,i)=>{
      const m=picks[i]?MOTIVATORS.find(x=>x.key===picks[i]):null;
      s.classList.toggle('is-filled',!!m);
      s.querySelector('.mi-slot-name').textContent=m?m.name:'—';
      s.querySelector('.mi-slot-cat').textContent=m?MI_CATS[m.cat].label:'';
    });
    // interpretation
    if(picks.length===3){
      const cats=picks.map(k=>MOTIVATORS.find(m=>m.key===k).cat);
      const allSame=cats.every(c=>c===cats[0]);
      const catLabel=MI_CATS[cats[0]].label;
      let para;
      if(allSame){
        para='All three of your top motivators sit in the <b>'+catLabel+'</b> category. That category really matters to you and is currently driving you. It is important those needs are met, otherwise you are likely to get itchy feet and want to move on.';
      } else {
        para='Your top motivators are spread across categories. You have a range of motivators which are important, and it may be easier to get some if not all of these needs met, or you may have some work to do to make things better.';
      }
      interp.innerHTML='<h4>What your top three suggests</h4><p>'+para+'</p>'+
        '<p>The honest question that follows: <b>do your primary motivators fit your current role?</b> If they don’t, do you need to have a conversation with your leader, or with yourself, to sort things out? Carry the answer straight into your Me PLC Plan below.</p>';
      interp.classList.add('is-shown');
    } else {
      interp.classList.remove('is-shown');
      interp.innerHTML='';
    }
  }

  function activate(key){
    const m=MOTIVATORS.find(x=>x.key===key);
    if(!m) return;
    const wasOpen=wrap.querySelector('.mi-chip.is-open')!==null;
    try{ playChime(); }catch(e){}
    wrap.querySelectorAll('.mi-chip').forEach(c=>c.classList.toggle('is-open',c.getAttribute('data-key')===key));
    empty.style.display='none';
    content.classList.remove('is-shown');
    void content.offsetWidth;
    const idx=picks.indexOf(key);
    const picked=idx>-1;
    const full=!picked&&picks.length>=3;
    const btnLabel=picked?'Remove from my top three':(full?'Top three already chosen':'Add to my top three');
    content.innerHTML=
      '<div class="ok-detail-head">'+
        '<span class="ok-detail-code" style="font-size:19px;padding:10px 12px">'+MI_CATS[m.cat].label+'</span>'+
        '<div class="ok-detail-titlewrap">'+
          '<h3 class="ok-detail-title">'+m.name+'</h3>'+
          '<p class="ok-detail-axis">'+MI_CATS[m.cat].strap+(picked?(' · your number '+(idx+1)+' · '+MI_POINTS[idx]+' points'):'')+'</p>'+
        '</div>'+
      '</div>'+
      '<p class="ok-detail-body">'+m.body+'</p>'+
      '<button type="button" class="mi-pick-btn'+(picked?' is-remove':'')+'" style="background:'+accent+'"'+(full?' disabled':'')+'>'+btnLabel+'</button>';
    const pickBtn=content.querySelector('.mi-pick-btn');
    if(full) pickBtn.style.opacity='.45';
    pickBtn.addEventListener('click',()=>{
      if(picked){ picks.splice(idx,1); }
      else if(picks.length<3){ picks.push(key); }
      refresh();
      activate(key);
    });
    content.classList.add('is-shown');
    centreScrollOnRange(cols,detail,wasOpen?60:350);
  }

  wrap.addEventListener('click',e=>{
    const chip=e.target.closest('.mi-chip');
    if(chip) activate(chip.getAttribute('data-key'));
  });

  return wrap;
}

// The four life positions. Descriptions adapted for the Pioneer:
// the same Transactional Analysis model, framed around Personal
// Power rather than the Liberator's leader-developer stance.
const OK_POSITIONS = [
  {
    code:'I+ U+',
    rectKey:'right',
    title:'I’m OK, You’re OK',
    axis:'The Pioneer: productive and Interdependent',
    body:'The most productive position to occupy, whenever possible. Behaviours are assertive but warm, and the underlying attitude is one of Positive Regard and trust, even when delivering bad news or raising a difficult issue. Expectations of yourself and of the other person are consistently high, and when they are held together with Positive Regard and Genuineness, the chances of those expectations being met rise significantly. This position is the bedrock of Personal Power.',
    isGoal:true
  },
  {
    code:'I+ U−',
    rectKey:'top',
    title:'I’m OK, You’re not OK',
    axis:'Dominating',
    body:'If this is your underlying attitude then your behaviour will indicate a feeling of superiority, either through an aggressive stance or, alternatively, an over-protective approach. This is likely to provoke resistance, aggressiveness or Dependency in the other party, and it closes down the honest two-way exchange the Pioneer relies on.'
  },
  {
    code:'I− U+',
    rectKey:'bottom',
    title:'I’m not OK, You’re OK',
    axis:'Submissive',
    body:'Self-esteem has taken a knock. You are strongly influenced by the other person, who is OK in your mind. The behaviours emanating from here are dependent, non-assertive and often yielding, which in turn can lead to a further dip in self-esteem. An interesting factor: those who often inhabit this position can make a lightning switch to I+ U−, and when the final straw is delivered, the response is often surprisingly aggressive to all parties.'
  },
  {
    code:'I− U−',
    rectKey:'left',
    title:'I’m not OK, You’re not OK',
    axis:'Hopeless',
    body:'This attitude shows itself in a suspicious and often hostile approach to others, with an underlying feeling of ‘Why bother, it won’t make any difference anyway’. To be on the receiving end of this type of behaviour can be frustrating and exhausting, and it requires considerable effort to deal with it appropriately.'
  }
];

// Centre a top element and a bottom element in view together.
function centreScrollOnRange(topEl, bottomEl, settleDelay){
  if (!topEl || !bottomEl) return;
  setTimeout(() => {
    try {
      const topRect = topEl.getBoundingClientRect();
      const botRect = bottomEl.getBoundingClientRect();
      const rangeTop = topRect.top + window.scrollY;
      const rangeBot = botRect.bottom + window.scrollY;
      const rangeHeight = rangeBot - rangeTop;
      const vh = window.innerHeight;
      const smallScreenOffset = (vh < 700) ? 70 : 0;
      let target;
      if (rangeHeight >= vh) {
        target = rangeTop - 24;
      } else {
        target = rangeTop - (vh - rangeHeight) / 2 + smallScreenOffset;
      }
      target = Math.max(0, target);
      const DEADBAND = 80;
      if (Math.abs(window.scrollY - target) < DEADBAND) return;
      window.scrollTo({ top: target, behavior: 'smooth' });
    } catch(e) { /* swallow */ }
  }, settleDelay || 0);
}

// Scroll-triggered reveal helper for the puzzle and the Wait head.
function okObserveReveal(el){
  el.classList.add('ok-reveal');
  if (!('IntersectionObserver' in window)) { el.classList.add('is-revealed'); return; }
  const obs = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting){ el.classList.add('is-revealed'); obs.unobserve(el); }
    });
  }, { threshold: 0.25 });
  obs.observe(el);
}

function buildOkPuzzleInteractive(){
  const wrap = document.createElement('div');
  wrap.className = 'ok-puzzle-wrap';

  const stage = document.createElement('div');
  stage.className = 'ok-puzzle-stage';
  stage.innerHTML = OK_CORRAL_PUZZLE_SVG;
  okObserveReveal(stage);
  wrap.appendChild(stage);

  const hint = document.createElement('p');
  hint.className = 'ok-puzzle-hint';
  hint.textContent = 'Tap any of the four positions to read what shapes the behaviours that flow from it.';
  wrap.appendChild(hint);

  const detail = document.createElement('div');
  detail.className = 'ok-detail-panel';
  detail.setAttribute('role', 'region');
  detail.setAttribute('aria-live', 'polite');

  const empty = document.createElement('div');
  empty.className = 'ok-detail-empty';
  empty.innerHTML = '<div class="ok-detail-empty-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M8 10h.01"/><path d="M12 10h.01"/><path d="M16 10h.01"/><path d="M9 16l-4 4V6a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2z"/></svg></div><p>Tap a position above to reveal the description and the behaviours it tends to provoke in the other person.</p>';
  detail.appendChild(empty);

  const content = document.createElement('div');
  content.className = 'ok-detail-content';
  detail.appendChild(content);

  wrap.appendChild(detail);

  const svg = stage.querySelector('svg');
  const rects = svg ? svg.querySelectorAll('#Blocks rect[data-pos-key]') : [];
  const corners = svg ? svg.querySelectorAll('#CoralText .ok-corner[data-pos-key]') : [];

  function activate(key){
    const pos = OK_POSITIONS.find(p => p.rectKey === key);
    if (!pos) return;
    const wasOpen = stage.classList.contains('has-active');
    try { playChime(); } catch(e) {}
    stage.classList.add('has-active');
    rects.forEach(r => r.classList.toggle('is-active', r.getAttribute('data-pos-key') === key));
    corners.forEach(c => c.classList.toggle('is-active', c.getAttribute('data-pos-key') === key));
    detail.classList.toggle('is-goal', !!pos.isGoal);
    empty.style.display = 'none';
    content.classList.remove('is-shown');

// Follows the established Wayfinder pattern: escPDF, sanitize,
// wrap, ASCII-only streams, Story Blue headers.
function escPDF(str){ return String(str).replace(/\\/g,'\\\\').replace(/\(/g,'\\(').replace(/\)/g,'\\)'); }
function pdfSanitize(str){
  if(!str) return '';
  return String(str)
    .replace(/[‘’]/g,"'")
    .replace(/[“”]/g,'"')
    .replace(/–|—/g,'-')
    .replace(/…/g,'...')
    .replace(/·/g,'-')
    .replace(/[^\x00-\x7F]/g,'');
}
function pdfWrap(text,maxChars){
  const clean=pdfSanitize(text);
  if(!clean) return [];
  const words=clean.split(/\s+/); const lines=[]; let line='';
  words.forEach(w=>{
    if((line+' '+w).trim().length>maxChars){
      if(line) lines.push(line.trim());
      if(w.length>maxChars){ for(let i=0;i<w.length;i+=maxChars) lines.push(w.substring(i,i+maxChars)); line=''; }
      else line=w;
    } else line=(line+' '+w).trim();
  });
  if(line) lines.push(line.trim());
  return lines;
}

const PDF_BLUE='0 0.38 0.68', PDF_BLUED='0 0.29 0.52', PDF_WHITE='1 1 1',
      PDF_GREY='0.42 0.46 0.52', PDF_DARK='0.15 0.15 0.15',
      PDF_TINT='0.96 0.98 1', PDF_TINTB='0.85 0.91 0.95';
function pdfHeader(title, right){
  let s='';
  s+=`${PDF_BLUE} rg\n${PDF_M} ${PDF_H-PDF_M-44} ${PDF_W-2*PDF_M} 44 re f\n`;
  s+=`${PDF_BLUED} rg\n${PDF_M} ${PDF_H-PDF_M-48} ${PDF_W-2*PDF_M} 4 re f\n`;
  s+=`${PDF_WHITE} rg\n`;
  s+=`BT /F1 15 Tf ${PDF_M+14} ${PDF_H-PDF_M-28} Td (${escPDF(pdfSanitize(title))}) Tj ET\n`;
  if(right) s+=`BT /F2 9 Tf ${PDF_W-PDF_M-14-right.length*4.4} ${PDF_H-PDF_M-28} Td (${escPDF(pdfSanitize(right))}) Tj ET\n`;
  return s;
}
function pdfFooter(label){
  return `${PDF_GREY} rg\nBT /F2 8 Tf ${PDF_M} ${PDF_M-10} Td (${escPDF(pdfSanitize(label+' - Generated '+new Date().toLocaleDateString('en-GB')))}) Tj ET\n`;
}
function assemblePDF(pageStreams, filename){
  let objCount=0; const objects=[];
  function addObj(data){ objCount++; objects.push({id:objCount,data}); return objCount; }
  const catalogId=addObj('<< /Type /Catalog /Pages 2 0 R >>');
  addObj(''); // pages placeholder
  const font1Id=addObj('<<  /Type /Font /Subtype /Type1 /BaseFont /Helvetica-Bold >>');
  const font2Id=addObj('<<  /Type /Font /Subtype /Type1 /BaseFont /Helvetica >>');
  const font3Id=addObj('<<  /Type /Font /Subtype /Type1 /BaseFont /Helvetica-Oblique >>');
  const pageIds=[];
  pageStreams.forEach(s=>{
    const streamBytes=new TextEncoder().encode(s);
    const streamId=addObj(`<< /Length ${streamBytes.length} >>\nstream\n${s}endstream`);
    const pageId=addObj(`<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${PDF_W} ${PDF_H}] /Contents ${streamId} 0 R /Resources << /Font << /F1 ${font1Id} 0 R /F2 ${font2Id} 0 R /F3 ${font3Id} 0 R >> >> >>`);
    pageIds.push(pageId);
  });
  objects[1].data=`<< /Type /Pages /Kids [${pageIds.map(id=>id+' 0 R').join(' ')}] /Count ${pageIds.length} >>`;
  let pdf='%PDF-1.4\n'; const offsets=[];
  objects.forEach(obj=>{ offsets.push(pdf.length); pdf+=`${obj.id} 0 obj\n${obj.data}\nendobj\n`; });
  const xrefOffset=pdf.length;
  pdf+=`xref\n0 ${objCount+1}\n0000000000 65535 f \n`;
  offsets.forEach(off=>{ pdf+=String(off).padStart(10,'0')+' 00000 n \n'; });
  pdf+=`trailer\n<< /Size ${objCount+1} /Root ${catalogId} 0 R >>\nstartxref\n${xrefOffset}\n%%EOF`;
  const blob=new Blob([pdf],{type:'application/pdf'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function buildDetailPage(seg){

    if(det.tool==='wvs')   cont.appendChild(buildWVSTool(accent,dark));
    if(det.tool==='meplc') cont.appendChild(buildMePLCTool(accent,dark));

    if(det.tool==='wla')   cont.appendChild(buildWLATool(accent,dark));
    if(det.tool==='negplan') cont.appendChild(buildNegPlanTool(accent,dark));
  }

  cont.appendChild(buildBackToTopButton('Back to top'));

  page.appendChild(cont);
  return page;
}

// ── WORK VICTIM SCALE (The Crux) ─────────────────────────────
// Twenty statements, verbatim from the book (page 30). Four-way
// selector. Ten or more in Strongly Agree or Agree suggests the
// reader may be on the way to becoming a Work Victim.
const WVS_STATEMENTS=[
  'I have little control over the way my work is done.',
  'I get little satisfaction from the work I do.',
  'The people who get in the way of me achieving real success are my managers.',
  'I feel stressed most of the time I’m at work.',
  'My contribution is not well recognised.',
  'There is little opportunity to learn new skills around here.',
  'No one takes any interest in my career.',
  'Things were much better in the ‘old’ days.',
  'I feel frustrated and powerless.',
  'I don’t really know what I want to do in the future.',
  'I don’t know how to achieve my aims.',
  'I feel that others less able than me succeed faster.',
  'I’m not in control of what happens to me.',
  'The demands made on me are impossible.',
  'I’m bored, under-stretched and under-utilised.',
  'I’m always having to fight the system or my manager.',
  'I’m not appreciated properly.',
  'I don’t really know what is expected of me.',
  'My strengths aren’t recognised and used.',
  'Other employers provide much better opportunities.'
];
const WVS_OPTS=['SA','A','D','SD'];
const WVS_OPT_LABELS={SA:'Strongly Agree',A:'Agree',D:'Disagree',SD:'Strongly Disagree'};

function buildWVSTool(accent,dark){
  const state={ answers:new Array(WVS_STATEMENTS.length).fill(null), name:'', reflection:'' };
  const card=document.createElement('div');
  card.className='tool-card';
  card.innerHTML=`
    <div class="eyebrow" style="color:${accent}">Interactive self-assessment</div>
    <h2>The Work Victim Scale</h2>
    <p class="tool-intro">For each statement, choose the response closest to how you honestly feel about your current situation. There are no right answers, and nothing leaves this page unless you download it. When you have answered all twenty, your result appears below, along with space to reflect.</p>
  `;
  const head=document.createElement('div');
  head.className='wvs-head';
  head.innerHTML=`<div class="wvs-stmt">Statement</div><div class="wvs-opts"><span>S&nbsp;Agree</span><span>Agree</span><span>Disagree</span><span>S&nbsp;Disagr.</span></div>`;
  card.appendChild(head);

  const rows=document.createElement('div');
  WVS_STATEMENTS.forEach((stmt,i)=>{
    const row=document.createElement('div');
    row.className='wvs-row';
    const txt=document.createElement('div');
    txt.className='wvs-stmt';
    txt.innerHTML=`<span class="n">${i+1}.</span>${stmt}`;
    row.appendChild(txt);
    const opts=document.createElement('div');
    opts.className='wvs-opts';
    WVS_OPTS.forEach(o=>{
      const b=document.createElement('button');
      b.className='wvs-opt';
      b.type='button';
      b.textContent=o;
      b.setAttribute('aria-label',`Statement ${i+1}: ${WVS_OPT_LABELS[o]}`);
      b.addEventListener('click',()=>{
        playShush();
        state.answers[i]=o;
        opts.querySelectorAll('.wvs-opt').forEach(x=>x.classList.toggle('sel',x===b));
        updateResult();
      });
      opts.appendChild(b);
    });
    row.appendChild(opts);
    rows.appendChild(row);
  });
  card.appendChild(rows);

  const result=document.createElement('div');
  result.className='wvs-result';
  card.appendChild(result);

  function tally(){ return state.answers.filter(a=>a==='SA'||a==='A').length; }
  function answered(){ return state.answers.filter(Boolean).length; }
  function updateResult(){
    const n=answered(), t=tally();
    let inner='';
    if(n<WVS_STATEMENTS.length){
      inner=`<div class="score">${n} of 20 answered</div><div class="verdict">Keep going: answer every statement to see your result.</div>`;
    } else if(t>=10){
      inner=`<div class="score">${t} of 20 in agreement</div><div class="verdict"><b>The book’s threshold is ten.</b> Agreeing with ten or more of these statements suggests you may be on the way to becoming a Work Victim. That is not a verdict, it is a signal: the Work Victim is a state of mind, not a job description, and the rest of this tool is about the way out. Start with the Mindset on this page, then work through the seven Skills.</div>`;
    } else if(t>=5){
      inner=`<div class="score">${t} of 20 in agreement</div><div class="verdict">Some Work Victim thinking is creeping in, which is entirely human: most of us slip into it when tired, frustrated or under pressure. Look at the statements you agreed with and pick one to take Responsible Initiative on this week.</div>`;
    } else {
      inner=`<div class="score">${t} of 20 in agreement</div><div class="verdict">Firmly in Pioneer territory. You broadly feel in control of your work and your direction. Use the seven Skills to build on that base, and revisit this scale whenever circumstances change.</div>`;
    }
    result.innerHTML=inner;
    if(n===WVS_STATEMENTS.length){ result.style.background = t>=10 ? '#fdf1ec' : '#eefaf3'; }
  }
  updateResult();

  const fields=document.createElement('div');
  fields.style.cssText='display:grid;grid-template-columns:1fr;gap:14px;margin-top:20px';
  fields.innerHTML=`
    <div class="tool-field"><label for="wvs-name">Your name (for the PDF)</label><input type="text" id="wvs-name" autocomplete="off"/></div>
    <div class="tool-field"><label for="wvs-reflection">Reflection: what strikes you about your answers?</label><textarea id="wvs-reflection" rows="4"></textarea></div>
  `;
  card.appendChild(fields);

  const btnRow=document.createElement('div');
  btnRow.style.cssText='display:flex;gap:10px;margin-top:18px;flex-wrap:wrap';
  const dl=document.createElement('button');
  dl.className='tool-btn';
  dl.style.background=accent;
  dl.innerHTML='Download my result as a PDF';
  dl.addEventListener('click',()=>{
    playChime();
    state.name=card.querySelector('#wvs-name').value;
    state.reflection=card.querySelector('#wvs-reflection').value;
    downloadWVSPDF(state);
  });
  btnRow.appendChild(dl);
  card.appendChild(btnRow);
  return card;
}

function downloadWVSPDF(state){
  try{
    const t=state.answers.filter(a=>a==='SA'||a==='A').length;
    const done=state.answers.filter(Boolean).length===WVS_STATEMENTS.length;
    const streams=[];
    // Page 1: statements 1 to 20 with answers
    let s='';
    s+=pdfHeader('Story Pioneer - The Work Victim Scale','The Crux | p.30');
    let y=PDF_H-PDF_M-74;
    s+=`${PDF_DARK} rg\nBT /F1 18 Tf ${PDF_M} ${y} Td (${escPDF('My responses')}) Tj ET\n`;
    if(state.name){ y-=18; s+=`${PDF_GREY} rg\nBT /F2 11 Tf ${PDF_M} ${y} Td (${escPDF(pdfSanitize('Name: '+state.name))}) Tj ET\n`; }
    y-=24;
    WVS_STATEMENTS.forEach((stmt,i)=>{
      const ans=state.answers[i] ? WVS_OPT_LABELS[state.answers[i]] : 'Not answered';
      const agree=state.answers[i]==='SA'||state.answers[i]==='A';
      const lines=pdfWrap((i+1)+'. '+stmt, 74);
      lines.forEach((ln,li)=>{
        s+=`${PDF_DARK} rg\nBT /F2 9.5 Tf ${PDF_M} ${y} Td (${escPDF(ln)}) Tj ET\n`;
        if(li===0){
          s+= (agree ? `0.78 0.33 0.11 rg\n` : `${PDF_BLUE} rg\n`);
          s+=`BT /F1 9.5 Tf ${PDF_W-PDF_M-108} ${y} Td (${escPDF(ans)}) Tj ET\n`;
        }
        y-=13.5;
      });
      y-=4.5;
    });
    s+=pdfFooter('Story Contracting - Pioneer Programme - Work Victim Scale');
    streams.push(s);
    // Page 2: score + reflection
    let s2='';
    s2+=pdfHeader('Story Pioneer - The Work Victim Scale','The Crux | p.30');
    let y2=PDF_H-PDF_M-80;
    s2+=`${PDF_DARK} rg\nBT /F1 20 Tf ${PDF_M} ${y2} Td (${escPDF('My result')}) Tj ET\n`;
    y2-=34;
    s2+=`${PDF_BLUE} rg\nBT /F1 15 Tf ${PDF_M} ${y2} Td (${escPDF(done ? (t+' of 20 statements in agreement') : 'Scale not fully completed')}) Tj ET\n`;
    y2-=26;
    const verdict = !done ? 'Complete all twenty statements in the tool to obtain a result.'
      : t>=10 ? 'Ten or more statements in agreement suggests you may be on the way to becoming a Work Victim. Treat it as a signal, not a verdict: the way out starts with the Mindset of Responsible Initiative and the seven Skills of The Pioneer.'
      : t>=5  ? 'Some Work Victim thinking is creeping in, which is entirely human. Look at the statements you agreed with and pick one to take Responsible Initiative on this week.'
      : 'Firmly in Pioneer territory. You broadly feel in control of your work and your direction. Build on that base with the seven Skills, and revisit the scale whenever circumstances change.';
    pdfWrap(verdict,80).forEach(ln=>{ s2+=`${PDF_DARK} rg\nBT /F2 11 Tf ${PDF_M} ${y2} Td (${escPDF(ln)}) Tj ET\n`; y2-=15; });
    y2-=18;
    s2+=`${PDF_BLUE} rg\nBT /F1 11 Tf ${PDF_M} ${y2} Td (${escPDF('MY REFLECTION')}) Tj ET\n`;
    y2-=12;
    const rl=pdfWrap(state.reflection,78);
    const boxH=Math.max(140, rl.length*14+24);
    s2+=`${PDF_TINT} rg\n${PDF_M} ${y2-boxH} ${PDF_W-2*PDF_M} ${boxH} re f\n`;
    s2+=`${PDF_TINTB} RG\n0.6 w\n${PDF_M} ${y2-boxH} ${PDF_W-2*PDF_M} ${boxH} re S\n`;
    if(rl.length){
      let cy=y2-18;
      rl.forEach(ln=>{ s2+=`${PDF_DARK} rg\nBT /F2 10 Tf ${PDF_M+12} ${cy} Td (${escPDF(ln)}) Tj ET\n`; cy-=14; });
    } else {
      s2+=`${PDF_GREY} rg\nBT /F3 10 Tf ${PDF_M+12} ${y2-18} Td (${escPDF('(not completed)')}) Tj ET\n`;
    }
    s2+=pdfFooter('Story Contracting - Pioneer Programme - Work Victim Scale');
    streams.push(s2);
    assemblePDF(streams,'Pioneer-Work-Victim-Scale-'+new Date().toISOString().slice(0,10)+'.pdf');
  }catch(err){
    console.error('Work Victim Scale PDF generation failed',err);
    alert('Sorry, there was a problem generating your PDF. Please try again.');
  }
}

const MEPLC_SECTIONS=[
  { biz:'Business objectives (3 to 5 year period)', title:'Career objectives',
    prompt:'Your objectives in terms of the type of work, level, industry, location and experience you are seeking.' },
  { biz:'Business history', title:'Career progression',

  { biz:'Background of the management team', title:'You',
    prompt:'Your personal experience, responsibilities, and your needs and plans for further development.' },
  { biz:'Market for the business', title:'Market for employment',
    prompt:'Your personal skills, qualifications and record of experience, compared with what the market you are in requires or expects.' },
  { biz:'Products', title:'Personal qualities and skills',
    prompt:'What are the key aspects of your personality and skills which could be valuable to an employer?' },
  { biz:'Pricing policy', title:'Salary',
    prompt:'What are your short and long term requirements? Are you prepared to accept lower earnings to acquire broad-based experience?' },
  { biz:'Suppliers', title:'Employers and network',
    prompt:'How do your current and potential employers stack up in terms of what they can offer you? How can your network help you?' },
  { biz:'Capital assets', title:'Personal resources',
    prompt:'What is your financial status? What are your commitments? Could you fund yourself through a full-time course of study? Do you have the discipline required for evening study?' },

function buildMePLCTool(accent,dark){
  const state={ name:'', fields:new Array(MEPLC_SECTIONS.length).fill('') };

  card.className='tool-card';
  card.innerHTML=`
    <div class="eyebrow" style="color:${accent}">Interactive planner · The anchor tool of The Pioneer</div>
    <h2>My Plan: Me PLC</h2>
    <p class="tool-intro">It is time to write your own plan for success, with The Mindset of The Pioneer. A business would not run without a plan, and you are the Managing Director of Me PLC. Each section below pairs what a normal business plan would cover with the career equivalent. Commit it to writing rather than keeping it in your head: that is what keeps you out of the Swamp. Download the PDF when you are done, keep it, and revisit it.</p>
    <div class="tool-field" style="margin-bottom:18px;max-width:420px"><label for="meplc-name">Your name (for the PDF)</label><input type="text" id="meplc-name" autocomplete="off"/></div>
  `;
  MEPLC_SECTIONS.forEach((sec,i)=>{
    const div=document.createElement('div');
    div.className='ws-section';
    div.innerHTML=`
      <span class="ws-tag" style="background:${accent}">Business plan: ${sec.biz}</span>
      <h3>${i+1}. ${sec.title}</h3>
      <p class="ws-prompt">${sec.prompt}</p>
      <textarea id="meplc-f${i}" rows="4" aria-label="${sec.title}"></textarea>
    `;
    card.appendChild(div);
  });
  const btnRow=document.createElement('div');
  btnRow.style.cssText='display:flex;gap:10px;margin-top:6px;flex-wrap:wrap';
  const dl=document.createElement('button');
  dl.className='tool-btn';
  dl.style.background=accent;
  dl.innerHTML='Download my Me PLC Plan as a PDF';
  dl.addEventListener('click',()=>{
    playChime();
    state.name=card.querySelector('#meplc-name').value;
    MEPLC_SECTIONS.forEach((sec,i)=>{ state.fields[i]=card.querySelector('#meplc-f'+i).value; });
    downloadMePLCPDF(state);
  });
  btnRow.appendChild(dl);
  card.appendChild(btnRow);
