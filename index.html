// ── PROBLEM-SOLVING NAVIGATOR (Skill 4) ──────────────────────
// Interactive version of the book's Problem-Solving Flowchart
// (page 127), patterned after the Wayfinder's Performance
// Navigator. Structure verified against the book diagram.
const PSN_NODES={
  start:{ q:'I have a problem or opportunity. Shall I try to sort it out (again)?',
    sub:'Be honest. Trying again takes energy, and sometimes the resilient choice is acceptance. But problems rarely sort themselves.',
    yes:{next:'plan',label:'Yes, I will tackle it'}, no:{next:'live',label:'No, not this time'} },
  live:{ q:'Can I live with it?',
    sub:'If you genuinely can, that is a legitimate choice, as long as it is a choice and not a slide into Work Victim thinking.',
    yes:{next:'out-cope',label:'Yes, I can live with it'}, no:{next:'start',label:'No, it will keep nagging me'} },
  plan:{ q:'Make a plan. Am I prepared to ask for help (again)?',
    sub:'Sketch out what would need to change and who would need to be involved. Pioneers ask for help: it is a strength, not a weakness.',
    yes:{next:'involve',label:'Yes, I will involve others'}, no:{next:'out-jobs',label:'No, I have exhausted that route'} },
  involve:{ q:'Involve others: HR, your line manager, colleagues. Shall I execute the plan?',
    sub:'With others involved and the plan in front of you, this is the moment of Responsible Initiative.',
    yes:{next:'evaluate',label:'Yes, execute it'}, no:{next:'live',label:'No, I am having second thoughts'} },
  evaluate:{ q:'Take action and evaluate. Did it solve the problem?',
    sub:'Give the plan a fair run, then judge it on the tangible outcome, not on how the process felt.',
    yes:{next:'out-celebrate',label:'Yes, it worked'}, no:{next:'plan',label:'No, back to the plan'} }
};
const PSN_OUTCOMES={
  'out-cope':{ title:'Adopt coping strategies. Avoid moaning. Move on!',
    body:'You have chosen to live with it, so own the choice. Coping strategies, a sense of humour and zero moaning: that is the resilient version of acceptance. The Work Victim version complains daily about a problem they have decided not to solve. Revisit this navigator if the situation changes.' },
  'out-jobs':{ title:'If you will not ask for help, the remaining option may be to change jobs. Move on!',
    body:'The book is blunt about this one: if a problem cannot be lived with, and you are not prepared to ask for help with it (again), the road left is a change of scene. That can be the right pioneering choice. Make it with a plan, not in a moment of frustration, and see the Me PLC Plan in Skill 7 before you leap.' },
  'out-celebrate':{ title:'Celebrate, and move on!',
    body:'You used Responsible Initiative, involved the right people, executed the plan and solved the problem. Mark the win properly: what you have just practised is the whole Pioneer approach in miniature. Then look for the next problem, or opportunity, worth tackling.' }
};

function buildPSNTool(accent,dark){
  const card=document.createElement('div');
  card.className='tool-card';
  card.innerHTML=`
    <div class="eyebrow" style="color:${accent}">Interactive decision tree</div>
    <h2>The Problem-Solving Navigator</h2>
    <p class="tool-intro">Bring a real problem or opportunity to mind and walk it through the book’s Problem-Solving Flowchart. Answer each question honestly and the navigator will take you to one of three endings. The thread running down the side of the original diagram says it all: resilience.</p>
  `;
  const crumbs=document.createElement('div');
  crumbs.className='psn-crumbs';
  const stage=document.createElement('div');
  card.appendChild(crumbs);
  card.appendChild(stage);
  const trail=[];

  function renderNode(id){
    const n=PSN_NODES[id];
    stage.innerHTML='';
    const box=document.createElement('div');
    box.className='psn-stage';
    box.innerHTML=`<div class="psn-q">${n.q}</div><p class="psn-sub">${n.sub}</p>`;
    const btns=document.createElement('div');
    btns.className='psn-btns';
    [['yes',n.yes],['no',n.no]].forEach(([ans,route])=>{
      const b=document.createElement('button');
      b.className='tool-btn';
      b.style.background = ans==='yes' ? accent : '#8fa0b0';
      b.textContent=route.label;
      b.addEventListener('click',()=>{
        playShush();
        trail.push({q:n.q, a:route.label});
        renderCrumbs();
        if(route.next.startsWith('out-')) renderOutcome(route.next);
        else renderNode(route.next);
      });
      btns.appendChild(b);
    });
    box.appendChild(btns);
    stage.appendChild(box);
  }
  function renderOutcome(id){
    const o=PSN_OUTCOMES[id];
    stage.innerHTML='';
    const box=document.createElement('div');
    box.className='psn-outcome';
    box.style.background=`linear-gradient(135deg,${dark},${accent})`;
    box.innerHTML=`<h3>${o.title}</h3><p>${o.body}</p>`;
    const again=document.createElement('button');
    again.className='tool-btn secondary';
    again.style.marginTop='16px';
    again.textContent='Start again with another problem';
    again.addEventListener('click',()=>{ playReturn(); trail.length=0; renderCrumbs(); renderNode('start'); });
    box.appendChild(again);
    stage.appendChild(box);
    playChime();
  }
  function renderCrumbs(){
    crumbs.innerHTML='';
    trail.forEach(t=>{
      const c=document.createElement('span');
      c.className='psn-crumb';
      c.innerHTML=`${t.q.split('.')[0]}? <b>${t.a}</b>`;
      crumbs.appendChild(c);
    });
  }
  renderNode('start');
  return card;
}

// ── WORKLOAD AUDIT AND ACHILLES HEEL FINDER (Skill 5) ────────
// The ten Common Timewasters (verified against book page 140)
// and the four problematic traits (page 137).
const WLA_TIMEWASTERS=[
  ['Procrastination','Putting things off, particularly unpleasant tasks, or putting off decisions even though they have been considered plenty of times.'],
  ['Disorganisation','Not knowing where to find things, not being clear where to start and what to do, creating your own chaos.'],
  ['Not prioritising','Doing what comes to hand, or is pleasant and easy to do, rather than what is important or urgent.'],
  ['Estimating time poorly','Not having an accurate estimate of how long a task will take, including not allowing for interruptions and problems.'],
  ['Too willing to help others out','Being over-willing to help others at the expense of your own work commitments.'],
  ['Interruptions','Not managing to get into the flow of work because of interruptions, necessary or not.'],
  ['Not anticipating problems','Being taken by surprise by problems instead of anticipating them in advance.'],
  ['Being impulsive','Acting when the whim takes you rather than on a more methodical basis.'],
  ['Unable to say No','Doing everything that comes your way, not being able to use positive negotiation to decide priorities and timescales.'],
  ['Losing track','Losing sense of what must be done and by when in the flurry of activities.']
];
const WLA_TRAITS=[
  ['Blaming','Every problem is blamed on someone else: the organisation, the boss, co-workers, the system. No responsibility is accepted for your own capability.'],
  ['Hero','Taking on everything, coming early and working late, acting like superman or superwoman and getting worn down. The payoff is basking in feeling over-busy and put upon.'],
  ['Because','“Surely you can’t expect much from me when I have such a handicap”: gender, size, race, background, state of health, whatever the excuse of the day is.'],
  ['I’m trying!','“Don’t blame me if things turn out wrong. After all, see how hard I tried.” The underlying agenda is to try, but not to achieve.']
];

function buildWLATool(accent,dark){
  const state={ tw:new Array(WLA_TIMEWASTERS.length).fill(false), tr:new Array(WLA_TRAITS.length).fill(false), heel:'', plan:'', name:'' };
  const card=document.createElement('div');
  card.className='tool-card';
  card.innerHTML=`
    <div class="eyebrow" style="color:${accent}">Interactive audit</div>
    <h2>Workload Audit and Achilles Heel finder</h2>
    <p class="tool-intro">Knowing how you tend to respond lets you use your strengths and manage your weaknesses. Tick every timewaster and trait that regularly catches you out; be honest, nobody is watching. Then name your Achilles Heel, the niggly thing that trips you up every time, and commit to one action against it.</p>
  `;
  function makeToggleList(items,stateArr,heading){
    const h=document.createElement('div');
    h.className='eyebrow';
    h.style.cssText=`color:${accent};font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:12px;letter-spacing:.22em;text-transform:uppercase;margin:18px 0 6px`;
    h.textContent=heading;
    card.appendChild(h);
    items.forEach((it,i)=>{
      const row=document.createElement('div');
      row.className='wla-item';
      row.setAttribute('role','checkbox');
      row.setAttribute('aria-checked','false');
      row.tabIndex=0;
      row.innerHTML=`
        <span class="wla-check"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>
        <span class="wla-body"><b>${it[0]}</b><span>${it[1]}</span></span>
      `;
      const toggle=()=>{
        playShush();
        stateArr[i]=!stateArr[i];
        row.classList.toggle('on',stateArr[i]);
        row.setAttribute('aria-checked',String(stateArr[i]));
      };
      row.addEventListener('click',toggle);
      row.addEventListener('keydown',e=>{ if(e.key===' '||e.key==='Enter'){ e.preventDefault(); toggle(); } });
      card.appendChild(row);
    });
  }
  makeToggleList(WLA_TIMEWASTERS,state.tw,'The ten common timewasters');
  makeToggleList(WLA_TRAITS,state.tr,'Problematic traits to watch for');

  const fields=document.createElement('div');
  fields.style.cssText='display:grid;grid-template-columns:1fr;gap:14px;margin-top:20px';
  fields.innerHTML=`
    <div class="tool-field"><label for="wla-heel">My Achilles Heel: the thing that trips me up every time</label><textarea id="wla-heel" rows="3"></textarea></div>
    <div class="tool-field"><label for="wla-plan">One action I will take against it, starting this week</label><textarea id="wla-plan" rows="3"></textarea></div>
    <div class="tool-field" style="max-width:420px"><label for="wla-name">Your name (for the PDF)</label><input type="text" id="wla-name" autocomplete="off"/></div>
  `;
  card.appendChild(fields);

  const btnRow=document.createElement('div');
  btnRow.style.cssText='display:flex;gap:10px;margin-top:18px;flex-wrap:wrap';
  const dl=document.createElement('button');
  dl.className='tool-btn';
  dl.style.background=accent;
  dl.innerHTML='Download my audit as a PDF';
  dl.addEventListener('click',()=>{
    playChime();
    state.heel=card.querySelector('#wla-heel').value;
    state.plan=card.querySelector('#wla-plan').value;
    state.name=card.querySelector('#wla-name').value;
    downloadWLAPDF(state);
  });
  btnRow.appendChild(dl);
  card.appendChild(btnRow);
  return card;

const NEGPLAN_STEPS=[

    topicLines.forEach(ln=>{ p1.s+=`${PDF_DARK} rg\nBT /F2 11 Tf ${PDF_M} ${y} Td (${escPDF(ln)}) Tj ET\n`; y-=15; });

    p1.s+=`${PDF_BLUE} rg\nBT /F1 12 Tf ${PDF_M} ${y} Td (${escPDF('THE DIAGNOSIS')}) Tj ET\n`;
    y-=16;
    if(typeDef){
      p1.s+=`${PDF_DARK} rg\nBT /F1 10.5 Tf ${PDF_M} ${y} Td (${escPDF(pdfSanitize(typeDef.label))}) Tj ET\n`;
      y-=14;
      pdfWrap(typeDef.note,88).forEach(ln=>{ p1.s+=`${PDF_GREY} rg\nBT /F2 9 Tf ${PDF_M} ${y} Td (${escPDF(ln)}) Tj ET\n`; y-=12; });
    } else {
      p1.s+=`${PDF_GREY} rg\nBT /F3 10 Tf ${PDF_M} ${y} Td (${escPDF('(not diagnosed)')}) Tj ET\n`;
      y-=14;
    }
    y-=14;
    y=sectionBox(p1,y,'1. '+NEGPLAN_STEPS[0].title,NEGPLAN_STEPS[0].prompt,state.steps[0]);
    y=sectionBox(p1,y,'2. '+NEGPLAN_STEPS[1].title,NEGPLAN_STEPS[1].prompt,state.steps[1]);
    p1.s+=pdfFooter('Story Contracting - Pioneer Programme - Negotiation Strategy Planner');
    streams.push(p1.s);

    // Page 2: steps 3 and 4, plus the aim
    const p2={s:''};
    p2.s+=pdfHeader('Story Pioneer - Negotiation Strategy Planner','Skill 3 | pp.107-120');
    let y2=PDF_H-PDF_M-74;
    y2=sectionBox(p2,y2,'3. '+NEGPLAN_STEPS[2].title,NEGPLAN_STEPS[2].prompt,state.steps[2]);
    y2=sectionBox(p2,y2,'4. '+NEGPLAN_STEPS[3].title,NEGPLAN_STEPS[3].prompt,state.steps[3]);
    y2-=6;
    p2.s+=`${PDF_BLUE} rg\nBT /F1 12 Tf ${PDF_M} ${y2} Td (${escPDF('THE AIM')}) Tj ET\n`;
    y2-=15;
    pdfWrap('Aim for Co-operating, not Compromising. Concentrate on behaviour and tangible outcomes, not values, and reach for a third solution that serves both sides better than a compromise would.',88).forEach(ln=>{
      p2.s+=`${PDF_DARK} rg\nBT /F2 10 Tf ${PDF_M} ${y2} Td (${escPDF(ln)}) Tj ET\n`; y2-=13.5;
    });
    p2.s+=pdfFooter('Story Contracting - Pioneer Programme - Negotiation Strategy Planner');
    streams.push(p2.s);

    assemblePDF(streams,'Pioneer-Negotiation-Plan-'+new Date().toISOString().slice(0,10)+'.pdf');
  }catch(err){
    console.error('Negotiation Strategy Planner PDF generation failed',err);
    alert('Sorry, there was a problem generating your PDF. Please try again.');
  }
}


// ── ROUTER ───────────────────────────────────────────────────
const app = document.getElementById('app');
let currentPage = null;

function showPage(el){
  if (currentPage) app.removeChild(currentPage);
  app.appendChild(el);
  currentPage = el;
  window.scrollTo(0, 0);
}

function goHome(){
  window.location.hash = '';
  showPage(buildWheelPage(goDetail, goCrux));
}

function goDetail(id){
  const seg = SEGMENTS.find(s => s.id === id);
  if (!seg) return goHome();
  window.location.hash = '#/' + id;
  showPage(buildDetailPage(seg));
}

function goCrux(){
  window.location.hash = '#/crux';
  showPage(buildDetailPage({ id:'crux' }));
}

function handleHash(){
  const hash = window.location.hash;
  if (hash === '#/crux'){ goCrux(); return; }
  if (hash.startsWith('#/')){
    const id = hash.slice(2);
    if (SEGMENTS.some(s => s.id === id)){ goDetail(id); return; }
  }
  goHome();
}

welcomeBtn.addEventListener('click', function(){
  getCtx(); audioReady = true;
  welcomeOverlay.classList.add('dismissed');

});

window.addEventListener('hashchange', handleHash);
handleHash();
