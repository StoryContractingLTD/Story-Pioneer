<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Story Pioneer</title>
<meta name="description" content="An interactive self-development toolkit for Story Contracting's Pioneer programme."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:ital,wght@0,700;0,800;1,800&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;background:#EAF4FB;font-family:'Barlow',system-ui,sans-serif;color:#333}
#app{min-height:100vh}

/* ── Welcome overlay ─────────────────────────────────────── */
.welcome-overlay{position:fixed;inset:0;z-index:100;background:#EAF4FB;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:opacity .4s ease,visibility .4s ease}
.welcome-overlay.dismissed{opacity:0;visibility:hidden;pointer-events:none}
.welcome-inner{text-align:center;max-width:520px;padding:32px;animation:fadeIn .6s ease both}
.welcome-logo{margin:0 auto 28px}
.welcome-logo svg{height:46px;width:auto}
.welcome-eyebrow{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;letter-spacing:.28em;text-transform:uppercase;color:#0061AD;margin-bottom:12px;opacity:.85}
.welcome-title{font-family:'Barlow Condensed','Arial Narrow',sans-serif;font-size:64px;font-weight:800;color:#004B86;letter-spacing:-.02em;line-height:1}
.welcome-sub{color:#666;font-size:16px;line-height:1.7;margin-top:18px;max-width:460px;margin-left:auto;margin-right:auto}
.welcome-btn{display:inline-flex;align-items:center;gap:10px;margin-top:30px;background:#0061AD;color:white;border:none;border-radius:24px;padding:14px 32px;font-family:'Barlow',sans-serif;font-weight:700;font-size:16px;cursor:pointer;box-shadow:0 8px 28px rgba(0,97,173,.25);transition:transform .15s ease,box-shadow .15s ease}
.welcome-btn:hover{transform:translateY(-2px);box-shadow:0 12px 36px rgba(0,97,173,.35)}
.welcome-btn:active{transform:scale(.97)}
.welcome-pulse{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.8);animation:pulse 1.8s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.4;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}

/* ── Page transitions ────────────────────────────────────── */
.page{min-height:100vh;animation:pageIn .32s ease both}
@keyframes pageIn{from{opacity:0;transform:translateX(28px)}to{opacity:1;transform:translateX(0)}}
.page-home{animation:fadeIn .28s ease both}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* ── Header ──────────────────────────────────────────────── */
.header{display:flex;align-items:center;justify-content:space-between;padding:14px 32px}
.header-left{display:flex;align-items:center;gap:16px}
.divider{width:1px;height:28px;background:#c8d8e8}
.tag{font-size:12px;font-weight:600;color:#8fa0b0;letter-spacing:.2em;text-transform:uppercase}
.header-right{display:flex;align-items:center;gap:12px}
.as-logo{height:34px;position:relative;overflow:hidden;border-radius:3px}
.as-logo::before{content:'';position:absolute;top:-50%;left:-75%;width:50%;height:200%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.18),transparent);transform:skewX(-20deg);animation:asShimmer 4.5s 2s ease-in-out infinite;z-index:1}
@keyframes asShimmer{0%{left:-75%}100%{left:150%}}
.as-logo svg{height:34px;width:auto;border-radius:3px;display:block}
.logo{display:inline-flex;align-items:center;justify-content:center;height:40px}
.logo svg{height:36px;width:auto}

/* ── Container ───────────────────────────────────────────── */
.container{max-width:1200px;margin:0 auto;padding:4px 32px 48px}
.center-block{text-align:center;max-width:660px;margin:0 auto 24px}
.title{font-family:'Barlow Condensed','Arial Narrow',sans-serif;font-size:52px;font-weight:800;color:#004B86;letter-spacing:-.02em;line-height:1.05}
.subtitle{color:#666;font-size:16px;line-height:1.75;margin-top:14px}

/* ── Wheel layout ────────────────────────────────────────── */
.wheel-layout{display:flex;gap:28px;align-items:flex-start;justify-content:center}
.wheel-col{flex:0 0 auto;width:min(620px,90vw)}
.info-col{flex:1;min-width:280px;max-width:380px;display:flex;flex-direction:column;gap:20px}
.card{background:white;border-radius:28px;padding:28px;box-shadow:0 6px 24px rgba(0,97,173,.07)}
.card h2{font-family:'Barlow Condensed','Arial Narrow',sans-serif;font-size:22px;font-weight:800;color:#004B86;margin-bottom:12px}
.card p{color:#666;line-height:1.75;font-size:14.5px}
.card .eyebrow{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:#0061AD;margin-bottom:8px;opacity:.85}

/* ── Wheel wrap ──────────────────────────────────────────── */
.wheel-wrap{position:relative;width:100%;background:white;border-radius:28px;padding:16px 16px 0;box-shadow:0 16px 48px rgba(0,97,173,.13),0 2px 12px rgba(0,0,0,.05);overflow:hidden}
.wheel-svg-container{position:relative;width:100%;padding-bottom:100%}
.wheel-svg-container>svg{position:absolute;top:0;left:0;width:100%;height:100%}
.wheel-svg-container>#overlay-svg{z-index:2;cursor:pointer}
.wheel-svg-container>#main-wheel{z-index:1}

/* Overlay wedges: dim the non-active segments when one is hovered */
.ov-wedge{fill:transparent;stroke:transparent;transition:fill .22s ease}
.wheel-svg-container.has-hover .ov-wedge{fill:rgba(10,30,60,0.55)}
.wheel-svg-container.has-hover .ov-wedge.active{fill:transparent}

/* Centre hub overlay (the Crux) */
.hub-circle{fill:transparent;cursor:pointer}
.hub-ring{fill:none;stroke:rgba(255,255,255,0);stroke-width:0;pointer-events:none;transition:stroke .3s ease, stroke-width .3s ease}
.hub-ring-outer{fill:none;stroke:rgba(255,255,255,0);stroke-width:0;pointer-events:none;transition:stroke .3s ease}
.hub-hovered .hub-ring{stroke:rgba(255,255,255,.7);stroke-width:8;animation:hubPulse 1.6s ease-in-out infinite}
.hub-hovered .hub-ring-outer{stroke:rgba(255,255,255,.25);stroke-width:5;animation:hubPulseOuter 1.6s ease-in-out infinite}
@keyframes hubPulse{0%,100%{stroke-width:6;stroke:rgba(255,255,255,.5)}50%{stroke-width:10;stroke:rgba(255,255,255,.85)}}
@keyframes hubPulseOuter{0%,100%{stroke-width:3;stroke:rgba(255,255,255,.18)}50%{stroke-width:6;stroke:rgba(255,255,255,.38)}}

/* ── Hover bar ───────────────────────────────────────────── */
.hover-bar{height:74px;margin:8px -16px 0;border-radius:0 0 28px 28px;display:flex;align-items:center;justify-content:center;padding:10px 20px;transition:all .25s ease;overflow:hidden}
.hover-bar.idle{background:#f0f6fc}
.hover-bar.active{background:#0061AD}
.hover-bar-content{text-align:center;transition:opacity .18s ease;width:100%}
.hover-bar .step-label{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;letter-spacing:.18em;text-transform:uppercase;margin-bottom:4px}
.hover-bar .skill-label{font-weight:600;font-size:16px;line-height:1.25}
.hover-bar .idle-text{color:#8fa0b0;font-size:13.5px;font-weight:500;line-height:1.6}
.hover-bar .click-hint{font-size:10px;letter-spacing:.16em;text-transform:uppercase;margin-top:4px;opacity:0.5}

/* ── Back button (for placeholder pages) ─────────────────── */
.back-btn{display:inline-flex;align-items:center;gap:8px;background:white;border:none;border-radius:20px;padding:10px 18px;cursor:pointer;font-family:'Barlow',sans-serif;font-weight:600;font-size:14px;color:#004B86;box-shadow:0 4px 16px rgba(0,97,173,.12);transition:transform .15s ease;margin-bottom:24px}
.back-btn:hover{transform:translateY(-2px)}
.back-btn:active{transform:scale(.97)}

/* ── Placeholder coming-soon page ────────────────────────── */
.placeholder{max-width:680px;margin:60px auto;background:white;border-radius:28px;padding:48px 44px;box-shadow:0 16px 48px rgba(0,97,173,.10);text-align:center}
.placeholder .eyebrow{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;letter-spacing:.22em;text-transform:uppercase;color:#0061AD;margin-bottom:10px}
.placeholder h1{font-family:'Barlow Condensed',sans-serif;font-size:38px;font-weight:800;color:#004B86;margin-bottom:14px;line-height:1.1}
.placeholder p{color:#666;font-size:15.5px;line-height:1.75;margin-bottom:18px}
.placeholder .tagline{font-style:italic;color:#0061AD;font-size:15px;margin-bottom:24px}

/* ── Responsive ──────────────────────────────────────────── */
@media (max-width: 900px){
  .wheel-layout{flex-direction:column;align-items:center}
  .info-col{max-width:620px;width:100%}
  .wheel-col{width:100%;max-width:620px}
  .title{font-size:42px}
  .welcome-title{font-size:48px}
  .header{padding:12px 18px}
  .container{padding:4px 18px 32px}
}

@media (prefers-reduced-motion: reduce){
  .welcome-pulse,.as-logo::before,.hub-ring,.hub-ring-outer{animation:none}
  .page,.page-home,.welcome-inner{animation:none}
}
</style>
</head>

function polarXY(cx, cy, r, angleDeg){
  const rad = ((angleDeg - 90) * Math.PI) / 180;
  return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
}

function wedgePath(cx, cy, r0, r1, a0, a1){
  const p0 = polarXY(cx, cy, r1, a0);
  const p1 = polarXY(cx, cy, r1, a1);
  const p2 = polarXY(cx, cy, r0, a1);
  const p3 = polarXY(cx, cy, r0, a0);
  const large = (a1 - a0) > 180 ? 1 : 0;
  return `M${p0.x.toFixed(2)},${p0.y.toFixed(2)} A${r1},${r1} 0 ${large} 1 ${p1.x.toFixed(2)},${p1.y.toFixed(2)} L${p2.x.toFixed(2)},${p2.y.toFixed(2)} A${r0},${r0} 0 ${large} 0 ${p3.x.toFixed(2)},${p3.y.toFixed(2)} Z`;
}

// ── AUDIO ────────────────────────────────────────────────────
// Web Audio API throughout. Gain values kept low (0.015 to 0.025)
// to stay subtle and professional, matching the Wayfinder.
let audioCtx = null;
let audioReady = false;
function getCtx(){
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}
document.addEventListener('click', function initAudio(){
  getCtx(); audioReady = true;
  document.removeEventListener('click', initAudio);
}, {once: true});

function playShush(){
  try{
    const ctx=getCtx(), now=ctx.currentTime;
    const buf=ctx.createBuffer(1,Math.floor(ctx.sampleRate*.09),ctx.sampleRate);
    const d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
    const src=ctx.createBufferSource(); src.buffer=buf;
    const flt=ctx.createBiquadFilter(); flt.type='bandpass'; flt.frequency.value=3800; flt.Q.value=0.7;
    const g=ctx.createGain();
    g.gain.setValueAtTime(0,now); g.gain.linearRampToValueAtTime(.018,now+.008); g.gain.exponentialRampToValueAtTime(.0001,now+.09);
    src.connect(flt); flt.connect(g); g.connect(ctx.destination); src.start(now); src.stop(now+.1);
  }catch(e){}
}
function playChime(){
  try{
    const ctx=getCtx(), now=ctx.currentTime;
    [523.25,783.99].forEach((freq,i)=>{
      const osc=ctx.createOscillator(), g=ctx.createGain();
      osc.type='sine'; osc.frequency.value=freq;
      g.gain.setValueAtTime(0,now); g.gain.linearRampToValueAtTime(.025-i*.006,now+.01); g.gain.exponentialRampToValueAtTime(.0001,now+.7);
      osc.connect(g); g.connect(ctx.destination); osc.start(now); osc.stop(now+.75);
    });
  }catch(e){}
}
function playReturn(){
  try{
    const ctx=getCtx(), now=ctx.currentTime;
    [{f:783.99,d:0},{f:523.25,d:.09}].forEach(({f,d})=>{
      const osc=ctx.createOscillator(), g=ctx.createGain();
      osc.type='sine'; osc.frequency.value=f;
      g.gain.setValueAtTime(0,now+d); g.gain.linearRampToValueAtTime(.022,now+d+.01); g.gain.exponentialRampToValueAtTime(.0001,now+d+.55);
      osc.connect(g); g.connect(ctx.destination); osc.start(now+d); osc.stop(now+d+.6);
    });
  }catch(e){}
}

// ── OVERLAY SVG ──────────────────────────────────────────────
// Invisible interactive layer over the wheel. Seven wedges for
// the Skills, plus a centre hub for the Crux.
function buildOverlaySVG(onHover, onClick, onHoverHub, onClickHub){
  const NS = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(NS, 'svg');
  svg.setAttribute('id','overlay-svg');
  svg.setAttribute('viewBox','0 0 671.54 671.74');
  svg.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%';

  const wedgeEls = [];
  SEGMENTS.forEach(seg => {
    const path = document.createElementNS(NS, 'path');
    path.setAttribute('d', wedgePath(CX, CY, R_INNER, R_OUTER, seg.startAngle, seg.endAngle));
    path.setAttribute('class', 'ov-wedge');
    path.dataset.id = seg.id;
    path.addEventListener('mouseenter', () => onHover(seg.id));
    path.addEventListener('click', () => onClick(seg.id));
    svg.appendChild(path);
    wedgeEls.push(path);
  });

  // Centre hub overlay: outer pulse ring, inner pulse ring, hit circle
  const hubRingOuter = document.createElementNS(NS, 'circle');
  hubRingOuter.setAttribute('cx', CX); hubRingOuter.setAttribute('cy', CY);
  hubRingOuter.setAttribute('r', R_HUB + 10);
  hubRingOuter.setAttribute('class', 'hub-ring-outer');
  svg.appendChild(hubRingOuter);

  const hubRing = document.createElementNS(NS, 'circle');
  hubRing.setAttribute('cx', CX); hubRing.setAttribute('cy', CY);
  hubRing.setAttribute('r', R_HUB - 4);
  hubRing.setAttribute('class', 'hub-ring');
  svg.appendChild(hubRing);

  const hubCircle = document.createElementNS(NS, 'circle');
  hubCircle.setAttribute('cx', CX); hubCircle.setAttribute('cy', CY);
  hubCircle.setAttribute('r', R_HUB);
  hubCircle.setAttribute('class', 'hub-circle');
  hubCircle.addEventListener('mouseenter', () => {
    svg.classList.add('hub-hovered');
    onHoverHub(true);
  });
  hubCircle.addEventListener('mouseleave', () => {
    svg.classList.remove('hub-hovered');
    onHoverHub(false);
  });
  hubCircle.addEventListener('click', () => onClickHub());
  svg.appendChild(hubCircle);

  svg.addEventListener('mouseleave', () => { svg.classList.remove('hub-hovered'); onHover(null); });

  return { svg, wedgeEls };
}

// ── WHEEL PAGE (HOME) ────────────────────────────────────────
function buildWheelPage(onOpenSkill, onOpenCrux){
  const page = document.createElement('div');
  page.className = 'page page-home';
  page.style.background = '#EAF4FB';

  let hoveredId = null;

  // Hover bar
  const hoverBar = document.createElement('div');
  hoverBar.className = 'hover-bar idle';
  const hoverBarContent = document.createElement('div');
  hoverBarContent.className = 'hover-bar-content';
  hoverBarContent.innerHTML = '<div class="idle-text">Hover over the wheel to explore the seven Skills and the Crux at its centre</div>';
  hoverBar.appendChild(hoverBarContent);

  // Main wheel + overlay
  const wheelSVG = getWheelSVG();
  const container = document.createElement('div');
  container.className = 'wheel-svg-container';
  container.appendChild(wheelSVG);

  const { svg: overlaySVG, wedgeEls } = buildOverlaySVG(
    (id) => {
      if (id !== null && id !== hoveredId) playShush();
      hoveredId = id;

      if (id) {
        container.classList.add('has-hover');
        wedgeEls.forEach(w => w.classList.toggle('active', w.dataset.id === id));
        const seg = SEGMENTS.find(s => s.id === id);
        const stepLabel = STEPS[seg.step].label;
        const stepAccent = STEPS[seg.step].accent;
        hoverBar.className = 'hover-bar active';
        hoverBar.style.background = stepAccent;
        hoverBarContent.innerHTML = `
          <div class="step-label" style="color:rgba(255,255,255,.6)">${stepLabel} \u00b7 Skill ${seg.number}</div>
          <div class="skill-label" style="color:white">${seg.label}</div>
          <div class="click-hint" style="color:rgba(255,255,255,.5)">Click to explore</div>
        `;
      } else {
        container.classList.remove('has-hover');
        wedgeEls.forEach(w => w.classList.remove('active'));
        hoverBar.className = 'hover-bar idle';
        hoverBar.style.background = '';
        hoverBarContent.innerHTML = '<div class="idle-text">Hover over the wheel to explore the seven Skills and the Crux at its centre</div>';
      }
    },
    (id) => { playChime(); onOpenSkill(id); },
    (isHovered) => {
      if (isHovered) {
        playShush();
        container.classList.remove('has-hover');
        wedgeEls.forEach(w => w.classList.remove('active'));
        hoverBar.className = 'hover-bar active';
        hoverBar.style.background = 'linear-gradient(135deg,#004B86,#0061AD)';
        hoverBarContent.innerHTML = `
          <div class="step-label" style="color:rgba(255,255,255,.6)">The Mindset</div>
          <div class="skill-label" style="color:white">${CRUX.label}</div>
          <div class="click-hint" style="color:rgba(255,255,255,.55)">${CRUX.hint}</div>
        `;
      } else {
        hoverBar.className = 'hover-bar idle';
        hoverBar.style.background = '';
        hoverBarContent.innerHTML = '<div class="idle-text">Hover over the wheel to explore the seven Skills and the Crux at its centre</div>';
      }
    },
    () => { playChime(); onOpenCrux(); }
  );
  container.appendChild(overlaySVG);

  const wheelWrap = document.createElement('div');
  wheelWrap.className = 'wheel-wrap';
  wheelWrap.appendChild(container);
  wheelWrap.appendChild(hoverBar);

  const wheelCol = document.createElement('div');
  wheelCol.className = 'wheel-col';
  wheelCol.appendChild(wheelWrap);

  // Info column
  const infoCol = document.createElement('div');

  c1.innerHTML = '<div class="eyebrow">About the Pioneer</div><h2>Take charge of your own success</h2><p>The Pioneer is the self-development companion to the Liberator. It is a tool for anyone who wants to shape their environment rather than be shaped by it. At its centre is the Mindset of Responsible Initiative. Around it sit the seven Skills that turn that Mindset into daily practice.</p>';

  const c2 = document.createElement('div');
  c2.className = 'card';
  c2.innerHTML = '<div class="eyebrow">How to use this tool</div><h2>Find your way around</h2><p>Hover over any segment of the wheel to see which Step it belongs to and which Skill it covers. Click to open a detailed page with the underlying model, a short explanation, and practical takeaways you can put to work straight away. The centre of the wheel opens the Crux, the Mindset that underpins everything else.</p>';

  const c3 = document.createElement('div');
  c3.className = 'card';
  c3.innerHTML = '<div class="eyebrow">The Pioneer Mindset</div><h2>A starting line, not a finish line</h2><p style="font-style:italic;color:#0061AD;font-size:15px;line-height:1.6;margin-bottom:10px">\u201cSuccess isn\u2019t a result of spontaneous combustion. You must set yourself on fire.\u201d</p><p style="font-size:13px;color:#8fa0b0">Arnold H Glasgow</p>';

  infoCol.appendChild(c1);
  infoCol.appendChild(c2);
  infoCol.appendChild(c3);

  const layout = document.createElement('div');
  layout.className = 'wheel-layout';
  layout.appendChild(wheelCol);
  layout.appendChild(infoCol);

  const centerBlock = document.createElement('div');
  centerBlock.className = 'center-block';
  centerBlock.innerHTML = '<h1 class="title">Story Pioneer</h1><p class="subtitle">An interactive self-development toolkit for the Pioneer programme. Explore the wheel to discover the Mindset and seven Skills that put you in charge of your own success at work.</p>';

  const cont = document.createElement('div');
  cont.className = 'container';
  cont.appendChild(centerBlock);
  cont.appendChild(layout);

  page.appendChild(buildHeader());
  page.appendChild(cont);
  return page;
}

// ── PLACEHOLDER DETAIL PAGE ──────────────────────────────────
// Used until the Skill and Crux content pages are built.
function buildPlaceholderPage(opts){
  const page = document.createElement('div');
  page.className = 'page';
  page.style.background = '#EAF4FB';
  page.appendChild(buildHeader());

  const cont = document.createElement('div');
  cont.className = 'container';

  const back = document.createElement('button');
  back.className = 'back-btn';
  back.innerHTML = '\u2190 Back to the wheel';
  back.addEventListener('click', () => { playReturn(); goHome(); });
  cont.appendChild(back);

  const ph = document.createElement('div');
  ph.className = 'placeholder';
  const eyebrowColour = opts.accent || '#0061AD';
  ph.innerHTML = `
    <div class="eyebrow" style="color:${eyebrowColour}">${opts.eyebrow || 'Pioneer'}</div>
    <h1>${opts.title}</h1>
    ${opts.tagline ? `<p class="tagline" style="color:${eyebrowColour}">\u201c${opts.tagline}\u201d</p>` : ''}
    <p>${opts.body || 'This page is in build. Detailed content, the model, key takeaways and any interactive tool will appear here once approved.'}</p>
    <p style="font-size:13px;color:#8fa0b0;margin-top:18px">Story Pioneer is currently a proposal in progress. Build proceeds page by page once each section is signed off.</p>
  `;
  cont.appendChild(ph);

  page.appendChild(cont);
  return page;
}

// ── ROUTER ───────────────────────────────────────────────────
const app = document.getElementById('app');
let currentPage = null;

function showPage(el){
  if (currentPage) app.removeChild(currentPage);
  app.appendChild(el);
  currentPage = el;
  window.scrollTo(0, 0);
}

function goHome(){
  window.location.hash = '';
  showPage(buildWheelPage(goDetail, goCrux));
}

function goDetail(id){
  const seg = SEGMENTS.find(s => s.id === id);
  if (!seg) return goHome();
  window.location.hash = '#/' + id;
  const step = STEPS[seg.step];
  showPage(buildPlaceholderPage({
    eyebrow: step.label + ' \u00b7 Skill ' + seg.number,
    title: seg.label,
    tagline: seg.tagline,
    accent: step.accent
  }));
}

function goCrux(){
  window.location.hash = '#/crux';
  showPage(buildPlaceholderPage({
    eyebrow: 'The Mindset, at the centre of the wheel',
    title: CRUX.label,
    tagline: CRUX.tagline,
    body: 'The Crux explores Responsible Initiative, the developmental modes (Dependency, Counter-dependency, Independency, Interdependency), and the Work Victim versus Pioneer framing. The Work Victim Scale self-assessment will live on this page.'
  }));
}

function handleHash(){
  const hash = window.location.hash;
  if (hash === '#/crux'){ goCrux(); return; }
  if (hash.startsWith('#/')){
    const id = hash.slice(2);
    if (SEGMENTS.some(s => s.id === id)){ goDetail(id); return; }
  }
  goHome();
}

// ── INITIALISE ───────────────────────────────────────────────
const welcomeOverlay = document.getElementById('welcome');
const welcomeBtn = document.getElementById('welcome-btn');
welcomeBtn.addEventListener('click', function(){
  getCtx(); audioReady = true;
  welcomeOverlay.classList.add('dismissed');
  setTimeout(() => { welcomeOverlay.style.display = 'none'; }, 500);
});

window.addEventListener('hashchange', handleHash);
handleHash();
